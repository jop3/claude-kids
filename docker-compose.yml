services:
  claudekids:
    build: .
    ports:
      - "3456:3456"
    volumes:
      # Mount .claude config dir and config file read-only for auth
      - ~/.claude:/root/.claude:ro
      - ~/.claude.json:/root/.claude.json:ro
      # Workspace where Claude writes files (persists between restarts)
      - claudekids-workspace:/workspace
    restart: unless-stopped

volumes:
  claudekids-workspace:
