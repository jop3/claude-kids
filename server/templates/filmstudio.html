<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{TITLE}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    font-family: 'Segoe UI', Impact, sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
    touch-action: manipulation;
  }

  /* Comic border frame */
  #frame {
    position: relative;
    width: 100%;
    max-width: 540px;
    height: 100vh;
    max-height: 820px;
    border: 6px solid {{GENRE_COLOR}};
    box-shadow: 0 0 30px {{GENRE_COLOR}}88, inset 0 0 20px rgba(0,0,0,0.5);
    overflow: hidden;
    cursor: pointer;
  }

  /* Panel container — slides */
  #panels {
    display: flex;
    width: 600%; /* 6 panels */
    height: 100%;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .panel {
    width: calc(100% / 6);
    height: 100%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 16px 12px 12px;
    position: relative;
    overflow: hidden;
  }

  /* Panel number badge */
  .panel-num {
    position: absolute;
    top: 10px;
    left: 10px;
    background: {{GENRE_COLOR}};
    color: #000;
    font-weight: 900;
    font-size: 0.85rem;
    padding: 2px 8px;
    border-radius: 6px;
  }

  /* Speech bubble */
  .bubble {
    background: #fff;
    border-radius: 16px;
    border: 3px solid #222;
    padding: 10px 14px;
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    font-weight: 700;
    color: #111;
    text-align: center;
    max-width: 92%;
    position: relative;
    margin-bottom: 4px;
    line-height: 1.35;
    box-shadow: 3px 3px 0 #222;
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -16px;
    left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: #222;
  }
  .bubble::before {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: #fff;
    z-index: 1;
  }

  /* Scene area */
  .scene {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    padding: 0 8px 8px;
    position: relative;
  }

  /* Characters */
  .char-svg {
    width: clamp(60px, 16vw, 90px);
    height: clamp(90px, 24vw, 140px);
    flex-shrink: 0;
  }

  /* Navigation hint */
  #nav-hint {
    position: absolute;
    bottom: 10px;
    right: 12px;
    color: {{GENRE_COLOR}};
    font-size: 1.6rem;
    animation: blink 1.2s infinite;
    z-index: 10;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Progress dots */
  #dots {
    position: absolute;
    top: 10px;
    right: 12px;
    display: flex;
    gap: 5px;
    z-index: 10;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: background 0.3s;
  }
  .dot.active { background: {{GENRE_COLOR}}; }

  /* Flash overlay for transition */
  #flash {
    position: absolute;
    inset: 0;
    background: {{GENRE_COLOR}};
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.08s;
  }

  /* Last panel restart button */
  #restart-btn {
    display: none;
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 32px;
    background: {{GENRE_COLOR}};
    color: #000;
    font-size: 1.1rem;
    font-weight: 900;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    z-index: 10;
    touch-action: manipulation;
  }

  /* Sound toggle */
  #sound-btn {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 10px;
    cursor: pointer;
    z-index: 10;
  }

  .world-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .scene, .bubble, .panel-num { position: relative; z-index: 1; }
</style>
</head>

      <circle cx="180" cy="20" r="2" fill="white" opacity="0.5"/>
      <circle cx="300" cy="25" r="2.5" fill="white" opacity="0.7"/>
      <ellipse cx="200" cy="160" rx="220" ry="30" fill="rgba(0,100,200,0.4)"/>
      <path d="M0 170 Q50 155 100 170 Q150 185 200 170 Q250 155 300 170 Q350 185 400 170 L400 250 L0 250 Z" fill="#0d47a1"/>
      <path d="M0 180 Q60 165 120 180 Q180 195 240 180 Q300 165 360 180 L400 185 L400 250 L0 250 Z" fill="#1565c0" opacity="0.7"/>
    </svg>`,
    vulkan: `<svg viewBox="0 0 400 250" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="lava-sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a0000"/><stop offset="100%" stop-color="#4a0a00"/></linearGradient></defs>
      <rect width="400" height="250" fill="url(#lava-sky)"/>
      <polygon points="200,30 100,200 300,200" fill="#3e2723"/>
      <polygon points="200,30 160,80 240,80" fill="#4e342e"/>
      <ellipse cx="200" cy="35" rx="20" ry="10" fill="#bf360c" opacity="0.9"/>
      <circle cx="200" cy="30" r="8" fill="#ff6d00"/>
      <rect y="200" width="400" height="50" fill="#3e2723"/>
      <path d="M0 215 Q100 200 200 210 Q300 220 400 205 L400 250 L0 250 Z" fill="#bf360c" opacity="0.6"/>
    </svg>`,
  };

  // ── Panel story texts ─────────────────────────────────────────────────────
  const heroLabel = HERO.charAt(0).toUpperCase() + HERO.slice(1);
  const villainLabel = VILLAIN.charAt(0).toUpperCase() + VILLAIN.slice(1);
  const miljoLabel = MILJO.charAt(0).toUpperCase() + MILJO.slice(1);

  const ENDING_TEXTS = {
    glad: `${heroLabel} vann! Alla jublade och levde lyckliga!`,
    cliffhanger: `Plotsligt... hordes ett dunkande ljud bakom dorren!`,
    roligt: `${villainLabel} snubblade och landet i en tarta. Alla skrattade!`,
    sorglig: `${heroLabel} vann men kandes ensam. Nasta gang blir battre...`,
    overraskande: `Det visade sig att ${villainLabel} egentligen var god hela tiden!`,
  };
  const endingText = ENDING_TEXTS[ENDING] || ENDING_TEXTS.glad;

  const PANELS_DATA = [
    {
      bubble: `I ${miljoLabel} levde en modig ${heroLabel}. Aventyret borjar!`,
      heroSide: 'left',
      villainSide: null,
    },
    {
      bubble: `Plotsligt dok ${villainLabel} upp! "Mu-ha-ha! Nu far du se!"`,
      heroSide: 'right',
      villainSide: 'left',
    },
    {
      bubble: `${heroLabel}: "Aldrig! Jag skyddar detta stallet!"`,
      heroSide: 'left',
      villainSide: 'right',
    },
    {
      bubble: `En episk strid brotjades! PANG! SWISH! BOOM!`,
      heroSide: 'left',
      villainSide: 'right',
    },
    {
      bubble: `${heroLabel} hittade sin styrka och slog tillbaka!`,
      heroSide: 'left',
      villainSide: null,
    },
    {
      bubble: endingText,
      heroSide: 'left',
      villainSide: null,
      isLast: true,
    },
  ];

  // ── Build panels ──────────────────────────────────────────────────────────
  const worldBg = WORLD_BGS[MILJO] || WORLD_BGS.skog;
  const heroSvg = HERO_SVGS[HERO] || HERO_SVGS.ninja;
  const villainSvg = VILLAIN_SVGS[VILLAIN] || VILLAIN_SVGS.drake;
  const panelsEl = document.getElementById('panels');
  const dotsEl = document.getElementById('dots');

  PANELS_DATA.forEach((p, idx) => {
    // Gradient backgrounds alternate slightly
    const brightness = 1 + idx * 0.04;
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.style.background = `linear-gradient(160deg, ${BG_TOP}, ${BG_BOT})`;

    // World background SVG
    const bgDiv = document.createElement('div');
    bgDiv.className = 'world-bg';
    bgDiv.innerHTML = worldBg;
    panel.appendChild(bgDiv);

    // Panel number
    const numEl = document.createElement('div');
    numEl.className = 'panel-num';
    numEl.textContent = `${idx + 1}/6`;
    panel.appendChild(numEl);

    // Speech bubble
    const bubbleEl = document.createElement('div');
    bubbleEl.className = 'bubble';
    bubbleEl.textContent = p.bubble;
    panel.appendChild(bubbleEl);

    // Scene with characters
    const sceneEl = document.createElement('div');
    sceneEl.className = 'scene';
    sceneEl.style.position = 'relative';
    sceneEl.style.zIndex = '1';

    // Ground
    const ground = document.createElement('div');
    ground.style.cssText = `position:absolute;bottom:0;left:0;right:0;height:30px;background:rgba(0,0,0,0.3);border-radius:8px 8px 0 0;`;
    sceneEl.appendChild(ground);

    if (p.heroSide === 'left') {
      const hEl = document.createElement('div');
      hEl.className = 'char-svg';
      hEl.innerHTML = heroSvg;
      sceneEl.appendChild(hEl);
    }

    // Spacer
    const spacer = document.createElement('div');
    spacer.style.flex = '1';
    sceneEl.appendChild(spacer);

    if (p.heroSide === 'right') {
      const hEl = document.createElement('div');
      hEl.className = 'char-svg';
      hEl.style.transform = 'scaleX(-1)';
      hEl.innerHTML = heroSvg;
      sceneEl.appendChild(hEl);
    }
    if (p.villainSide === 'right') {
      const vEl = document.createElement('div');
      vEl.className = 'char-svg';
      vEl.style.transform = 'scaleX(-1)';
      vEl.innerHTML = villainSvg;
      sceneEl.appendChild(vEl);
    }
    if (p.villainSide === 'left') {
      const vEl = document.createElement('div');
      vEl.className = 'char-svg';
      vEl.innerHTML = villainSvg;
      sceneEl.insertBefore(vEl, spacer);
    }

    panel.appendChild(sceneEl);

    panelsEl.appendChild(panel);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot' + (idx === 0 ? ' active' : '');
    dotsEl.appendChild(dot);
  });

  // ── Navigation ────────────────────────────────────────────────────────────
  let current = 0;
  const totalPanels = PANELS_DATA.length;
  const navHint = document.getElementById('nav-hint');
  const restartBtn = document.getElementById('restart-btn');
  const flash = document.getElementById('flash');
  const dots = document.querySelectorAll('.dot');
  const frame = document.getElementById('frame');

  function goTo(idx) {
    if (idx < 0 || idx >= totalPanels) return;
    // Flash
    flash.style.opacity = '0.4';
    setTimeout(() => { flash.style.opacity = '0'; }, 150);

    current = idx;
    panelsEl.style.transform = `translateX(calc(-${100 / 6 * idx}%))`;

    dots.forEach((d, i) => d.classList.toggle('active', i === idx));

    if (idx === totalPanels - 1) {
      navHint.style.display = 'none';
      restartBtn.style.display = 'block';
    } else {
      navHint.style.display = 'block';
      restartBtn.style.display = 'none';
    }
  }

  frame.addEventListener('click', e => {
    if (e.target === restartBtn) return;
    if (current < totalPanels - 1) {
      goTo(current + 1);
    }
  });

  restartBtn.addEventListener('click', e => {
    e.stopPropagation();
    goTo(0);
  });

  // Swipe support
  let touchStartX = 0;
  frame.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  frame.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) {
      if (dx < 0) goTo(current + 1);
      else goTo(current - 1);
    }
  });

  // ── Ambient Audio ─────────────────────────────────────────────────────────
  const AMBIENT = '{{AMBIENT}}';
  let audioCtx = null;
  let audioOn = true;
  const soundBtn = document.getElementById('sound-btn');

  function startAmbient() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const ac = audioCtx;
    // Simple looping ambient based on genre
    const patterns = {
      epic:    [220, 261, 293, 349, 392, 440],
      bouncy:  [392, 440, 494, 523, 587, 659],
      tense:   [196, 220, 246, 233, 196, 185],
      synth:   [440, 494, 554, 622, 698, 784],
      magical: [261, 311, 370, 415, 466, 523],
    };
    const notes = patterns[AMBIENT] || patterns.epic;
    let noteIdx = 0;
    let interval;

    function playNote() {
      if (!audioOn) return;
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = AMBIENT === 'synth' ? 'square' : AMBIENT === 'tense' ? 'sawtooth' : 'sine';
      osc.frequency.value = notes[noteIdx % notes.length];
      gain.gain.setValueAtTime(0, ac.currentTime);
      gain.gain.linearRampToValueAtTime(0.06, ac.currentTime + 0.08);
      gain.gain.linearRampToValueAtTime(0, ac.currentTime + 0.6);
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.start();
      osc.stop(ac.currentTime + 0.65);
      noteIdx++;
    }

    playNote();
    interval = setInterval(playNote, 700);
    return interval;
  }

  let ambientInterval = null;

  soundBtn.addEventListener('click', e => {
    e.stopPropagation();
    audioOn = !audioOn;
    soundBtn.textContent = audioOn ? 'Ljud av' : 'Ljud pa';
    if (audioOn && !ambientInterval) {
      ambientInterval = startAmbient();
    }
  });

  // Auto-start on first interaction
  frame.addEventListener('click', () => {
    if (!ambientInterval) {
      ambientInterval = startAmbient();
    }
  }, { once: true });

  // Title in first panel bubble update
  document.title = TITLE;
})();
</script>
</body>
</html>
