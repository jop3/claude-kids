<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{TITLE}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: {{BG}};
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 16px 12px 20px;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 520px;
  }
  #subject-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: {{ACCENT}}22;
    border: 1.5px solid {{ACCENT}}66;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    color: {{ACCENT}};
  }
  #score-display {
    font-size: 1.1rem;
    font-weight: 800;
    color: {{ACCENT}};
  }

  /* Progress bar */
  #progress-track {
    width: 100%;
    max-width: 520px;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: {{ACCENT}};
    border-radius: 5px;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px {{ACCENT}}88;
  }

  /* Question area */
  #question-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 520px;
    gap: 16px;
    padding: 8px 0;
  }

  #question-num {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1px;
  }

  #question-text {
    font-size: clamp(1.2rem, 5vw, 1.8rem);
    font-weight: 800;
    color: #fff;
    text-align: center;
    line-height: 1.3;
    padding: 0 8px;
    min-height: 3em;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Answers grid */
  #answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
  }

  .ans-btn {
    padding: 18px 10px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07);
    color: #fff;
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.1s, background 0.15s, border-color 0.15s;
    text-align: center;
    line-height: 1.3;
  }
  .ans-btn:hover { background: rgba(255,255,255,0.13); }
  .ans-btn.correct {
    background: #1b5e20;
    border-color: #4caf50;
    box-shadow: 0 0 16px #4caf5066;
  }
  .ans-btn.wrong {
    background: #b71c1c;
    border-color: #f44336;
  }
  .ans-btn.reveal {
    background: #1b5e20;
    border-color: #4caf50;
    opacity: 0.7;
  }
  .ans-btn:disabled { cursor: default; }

  /* Feedback overlay */
  #feedback {
    font-size: 2.8rem;
    min-height: 3.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s;
  }

  /* End screen */
  #end-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex: 1;
    width: 100%;
    max-width: 520px;
    text-align: center;
  }
  #stars-display {
    font-size: 3.5rem;
    letter-spacing: 6px;
  }
  #end-title {
    font-size: 1.6rem;
    font-weight: 900;
    color: {{ACCENT}};
  }
  #end-subtitle {
    font-size: 1rem;
    color: rgba(255,255,255,0.65);
  }
  #restart-btn {
    padding: 16px 40px;
    background: {{ACCENT}};
    border: none;
    border-radius: 16px;
    color: #000;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 16px {{ACCENT}}55;
    touch-action: manipulation;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: fall linear forwards;
    pointer-events: none;
    z-index: 100;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
  }
  #streak-display {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 50; opacity: 0;
    transition: opacity 0.2s;
  }
  #streak-display.show { opacity: 1; }
  #streak-text {
    font-size: 3.5rem; font-weight: 900;
    text-shadow: 0 0 30px currentColor, 0 4px 12px rgba(0,0,0,0.5);
    animation: streakPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes streakPop {
    0% { transform: scale(0.3) rotate(-8deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  @keyframes rainbow {
    0%   { color: #ff6b6b; }
    20%  { color: #ffd700; }
    40%  { color: #51cf66; }
    60%  { color: #74c0fc; }
    80%  { color: #cc5de8; }
    100% { color: #ff6b6b; }
  }
  .streak-rainbow { animation: streakPop 0.4s both, rainbow 0.8s linear infinite; }
</style>

        { q: 'Vad heter "blomma" på engelska?', a: ['Flower','Tree','Grass','Leaf'], correct: 0 },
      ],
      lagom: [
        { q: 'Vad betyder "beautiful" på svenska?', a: ['Vacker','Glad','Stor','Snabb'], correct: 0 },
        { q: 'Vad heter "bibliotek" på engelska?', a: ['Library','Bookstore','Museum','School'], correct: 0 },
        { q: 'Vad betyder "difficult" på svenska?', a: ['Svår','Lätt','Rolig','Tråkig'], correct: 0 },
        { q: 'Hur säger man "I like football" på svenska?', a: ['Jag gillar fotboll','Jag spelar fotboll','Jag ser fotboll','Jag äter fotboll'], correct: 0 },
        { q: 'Vad heter "måndag" på engelska?', a: ['Monday','Tuesday','Sunday','Wednesday'], correct: 0 },
        { q: 'Vad betyder "friend" på svenska?', a: ['Vän','Fiende','Familj','Granne'], correct: 0 },
        { q: 'Vad heter "januari" på engelska?', a: ['January','February','June','July'], correct: 0 },
        { q: 'Vad betyder "quickly" på svenska?', a: ['Snabbt','Sakta','Starkt','Mjukt'], correct: 0 },
        { q: 'Hur säger man "How old are you?"?', a: ['Hur gammal är du?','Vad heter du?','Var bor du?','Vad gör du?'], correct: 0 },
        { q: 'Vad heter "regnbåge" på engelska?', a: ['Rainbow','Sunshine','Cloud','Storm'], correct: 0 },
        { q: 'Vad betyder "to swim" på svenska?', a: ['Simma','Springa','Hoppa','Flyga'], correct: 0 },
        { q: 'Vad är plural av "child" på engelska?', a: ['Children','Childs','Childrens','Child'], correct: 0 },
        { q: 'Vad heter "lärare" på engelska?', a: ['Teacher','Doctor','Farmer','Driver'], correct: 0 },
        { q: 'Vad betyder "hungry" på svenska?', a: ['Hungrig','Trött','Ledsen','Glad'], correct: 0 },
        { q: 'Vad heter "fredag" på engelska?', a: ['Friday','Monday','Sunday','Thursday'], correct: 0 },
        { q: 'Vad heter "sommar" på engelska?', a: ['Summer','Winter','Spring','Autumn'], correct: 0 },
        { q: 'Hur säger man "Jag heter Johan" på engelska?', a: ['My name is Johan','I am Johan','Hello Johan','Call me Johan'], correct: 0 },
        { q: 'Vad heter "grön" på engelska?', a: ['Green','Blue','Purple','Brown'], correct: 0 },
        { q: 'Vad heter "natt" på engelska?', a: ['Night','Day','Morning','Evening'], correct: 0 },
        { q: 'Vad heter "brev" på engelska?', a: ['Letter','Email','Parcel','Note'], correct: 0 },
        { q: 'Vad betyder "cold" på svenska?', a: ['Kall','Varm','Vät','Torr'], correct: 0 },
      ],
      svart: [
        { q: 'Vad är det engelska idiomatiska uttrycket för "det regnar kraftigt"?', a: ["It's raining cats and dogs",'Heavy rain','Strong rain','Lots of rain'], correct: 0 },
        { q: 'Vad heter det grammatiska fenomenet när ett verb tar ett objekt?', a: ['Transitive verb','Intransitive verb','Auxiliary verb','Modal verb'], correct: 0 },
        { q: 'Vad heter "kunskap" som abstract noun på engelska?', a: ['Knowledge','Knowing','Known','Know'], correct: 0 },
        { q: 'Vad är skillnaden mellan "affect" och "effect"?', a: ['"Affect" är vanligen verb, "effect" substantiv','"Effect" är vanligen verb, "affect" substantiv','De är synonymer','Ingen skillnad'], correct: 0 },
        { q: 'Vad kallas den engelska prepositionsfrasen i "She is good at math"?', a: ['Prepositional phrase','Noun phrase','Verb phrase','Adjective phrase'], correct: 0 },
        { q: 'Vilket av dessa är ett "false friend" (falskt vänord)?', a: ['"Gymnasium" (gym, ej gymnasium)','Dog (hund)','Cat (katt)','Sun (sol)'], correct: 0 },
        { q: 'Hur bildar man "third conditional" på engelska?', a: ['If + had + V3, would have + V3','If + V2, would + V1','If + V1, will + V1','If + V, shall + V'], correct: 0 },
        { q: 'Vad kallas ett ord som låter likadant som vad det beskriver?', a: ['Onomatopoeia','Alliteration','Simile','Metaphor'], correct: 0 },
        { q: 'Vad är korrekt form av "who/whom" i "__ did you see?"?', a: ['Whom','Who','Whose','Which'], correct: 0 },
        { q: 'Vad heter den engelska grammatikala termen för "ordningstal" (first, second)?', a: ['Ordinal numbers','Cardinal numbers','Nominal numbers','Sequential numbers'], correct: 0 },
        { q: 'Vilket engelska ord är ett "gerund" i "Swimming is fun"?', a: ['Swimming','Is','Fun','Hela meningen'], correct: 0 },
        { q: 'Vad kallas den retoriska figuren i "She sells sea shells"?', a: ['Alliteration','Rhyme','Assonance','Anaphora'], correct: 0 },
        { q: 'Vad är en "split infinitive" i engelska?', a: ['Att sätta adverb mellan "to" och verb','Att sluta en mening med preposition','Att starta med konjunktion','Att använda passiv'], correct: 0 },
        { q: 'Vilket engelska ord är ett "dangling modifier"?', a: ['"Running fast, the bus was caught" (felaktig)','Running','Fast','Bus'], correct: 0 },
        { q: 'Vad är "subjunctive mood" i engelska?', a: ['Konjunktiv (hypotetisk form)','Imperativ','Konditionalis','Infinitiv'], correct: 0 },
        { q: 'Vilket engelska ord är ett "pleonasm"?', a: ['"Free gift" (redundant)','Gift','Free','Present'], correct: 0 },
        { q: 'Vad kallas engelska ord med ursprung i latin/franska jämfört med germanska?', a: ['Latinate vs Germanic vocabulary','Formal vs informal','Written vs spoken','Old vs Modern English'], correct: 0 },
        { q: 'Vad är "Oxford comma"?', a: ['Komma före sista "and" i en lista','Brittisk stavning','Formellt skrivsätt','Akademisk stil'], correct: 0 },
        { q: 'Vilket tidsuttryck är korrekt engelska för nutid pågående?', a: ['Present continuous (is doing)','Simple present (does)','Present perfect (has done)','Past continuous (was doing)'], correct: 0 },
        { q: 'Vad kallas "register" i engelska lingvistik?', a: ['Språklig stil anpassad till situation','Grammatisk form','Uttal','Ordklass'], correct: 0 },
        { q: 'Vilket fenomen kallas "code-switching"?', a: ['Att byta språk mitt i samtal','Att stava fel','Att prata fort','Att skriva kort'], correct: 0 },
      ],
    },
  };

  // ── Select questions ──────────────────────────────────────────────────────
  const amneKey = Object.keys(QB).find(k => AMNE.toLowerCase().includes(k)) || 'matte';
  const svKey = SVARIGHET === 'latt' || SVARIGHET === 'lätt' ? 'latt'
              : SVARIGHET === 'svart' || SVARIGHET === 'svårt' ? 'svart'
              : 'lagom';

  const pool = QB[amneKey]?.[svKey] || QB.matte.latt;
  // Shuffle and pick 10
  const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, 10);

  // Shuffle answer options within each question
  const questions = shuffled.map(q => {
    const correct_ans = q.a[q.correct];
    const shuffled_a = [...q.a].sort(() => Math.random() - 0.5);
    return {
      q: q.q,
      a: shuffled_a,
      correct: shuffled_a.indexOf(correct_ans),
    };
  });

  // ── State ─────────────────────────────────────────────────────────────────
  let current = 0;
  let score = 0;
  let answered = false;
  let streak = 0;

  const questionEl = document.getElementById('question-text');
  const questionNumEl = document.getElementById('question-num');
  const answerBtns = document.querySelectorAll('.ans-btn');
  const feedbackEl = document.getElementById('feedback');
  const progressFill = document.getElementById('progress-fill');
  const scoreDisplay = document.getElementById('score-display');
  const questionArea = document.getElementById('question-area');
  const endScreen = document.getElementById('end-screen');
  const starsEl = document.getElementById('stars-display');
  const endTitle = document.getElementById('end-title');
  const endSubtitle = document.getElementById('end-subtitle');
  const restartBtn = document.getElementById('restart-btn');

  let streakTimer = null;
  function showStreak(n) {
    const el = document.getElementById('streak-display');
    const txt = document.getElementById('streak-text');
    txt.className = n >= 8 ? 'streak-rainbow' : '';
    txt.style.color = n >= 8 ? '' : n >= 5 ? '#ff1744' : '#ff9800';
    txt.textContent = `🔥 ${n} i rad!`;
    el.classList.add('show');
    if (streakTimer) clearTimeout(streakTimer);
    streakTimer = setTimeout(() => el.classList.remove('show'), 1000);
  }

  function loadQuestion() {
    if (current >= questions.length) { showEnd(); return; }
    answered = false;
    const q = questions[current];
    questionNumEl.textContent = `Fråga ${current + 1} av ${questions.length}`;
    questionEl.textContent = q.q;
    feedbackEl.textContent = '';
    answerBtns.forEach((btn, i) => {
      btn.textContent = q.a[i];
      btn.className = 'ans-btn';
      btn.disabled = false;
    });
    progressFill.style.width = (current / questions.length * 100) + '%';
    scoreDisplay.textContent = `${score} / ${current}`;
  }

  answerBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (answered) return;
      answered = true;
      const idx = parseInt(btn.dataset.idx);
      const q = questions[current];
      answerBtns.forEach(b => b.disabled = true);

      if (idx === q.correct) {
        score++;
        streak++;
        btn.classList.add('correct');
        feedbackEl.textContent = '✅ Rätt!';
        if (streak >= 3) {
          showStreak(streak);
          try { window.parent.postMessage({ type: 'streak', count: streak }, '*'); } catch(e) {}
        }
      } else {
        streak = 0;
        btn.classList.add('wrong');
        answerBtns[q.correct].classList.add('reveal');
        feedbackEl.textContent = '❌ Fel!';
      }

      scoreDisplay.textContent = `${score} / ${current + 1}`;

      setTimeout(() => {
        current++;
        if (current >= questions.length) {
          showEnd();
        } else {
          loadQuestion();
        }
      }, 1400);
    });
  });

  function showEnd() {
    questionArea.style.display = 'none';
    endScreen.style.display = 'flex';
    progressFill.style.width = '100%';
    scoreDisplay.textContent = `${score} / ${questions.length}`;

    const pct = score / questions.length;
    let stars, title, subtitle;
    if (pct >= 0.9) {
      stars = '⭐⭐⭐';
      title = 'MÄSTERLIG! 🏆';
      subtitle = `${score} av ${questions.length} rätt — du är ett geni!`;
    } else if (pct >= 0.6) {
      stars = '⭐⭐';
      title = 'BRA JOBBAT! 🎉';
      subtitle = `${score} av ${questions.length} rätt — imponerande!`;
    } else {
      stars = '⭐';
      title = 'KUL FÖRSÖKT! 💪';
      subtitle = `${score} av ${questions.length} rätt — öva så blir det bättre!`;
    }

    starsEl.textContent = stars;
    endTitle.textContent = title;
    endSubtitle.textContent = subtitle;
    launchConfetti();
  }

  function launchConfetti() {
    const colors = [ACCENT, '#ffd700', '#ff6b6b', '#51cf66', '#74c0fc'];
    for (let i = 0; i < 50; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.animationDuration = (2 + Math.random() * 2) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }, i * 30);
    }
  }

  restartBtn.addEventListener('click', () => {
    current = 0; score = 0; streak = 0;
    questions.sort(() => Math.random() - 0.5);
    endScreen.style.display = 'none';
    questionArea.style.display = '';
    loadQuestion();
  });

  loadQuestion();
})();
</script>
