<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{TITLE}}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, {{BG_TOP}}, {{BG_BOT}});
    font-family: 'Segoe UI', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    user-select: none;
    touch-action: manipulation;
    color: #fff;
  }

  /* Progress bar */
  #progress-bar-wrap {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  #progress-bar {
    height: 4px;
    background: {{ACCENT}};
    transition: width 0.5s ease;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px 8px;
    flex-shrink: 0;
    width: 100%;
    max-width: 600px;
  }
  #chapter-label {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #book-title {
    font-size: clamp(0.95rem, 3vw, 1.15rem);
    font-weight: 800;
    color: {{ACCENT}};
    text-align: center;
    text-shadow: 0 0 12px {{ACCENT}}88;
    flex: 1;
  }

  /* Story card */
  #story-wrap {
    flex: 1;
    width: 100%;
    max-width: 600px;
    padding: 0 16px 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  #story-card {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.12);
    padding: 20px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: {{ACCENT}}44 transparent;
    position: relative;
    transition: opacity 0.35s, transform 0.35s;
  }
  #story-card.slide-out {
    opacity: 0;
    transform: translateX(-60px);
  }
  #story-card.slide-in {
    opacity: 0;
    transform: translateX(60px);
  }

  #chapter-emoji {
    font-size: clamp(3rem, 12vw, 5rem);
    text-align: center;
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    flex-shrink: 0;
  }
  #chapter-title {
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    font-weight: 900;
    color: {{ACCENT}};
    text-align: center;
    text-shadow: 0 0 10px {{ACCENT}}66;
    flex-shrink: 0;
  }
  #chapter-text {
    font-size: clamp(0.9rem, 2.8vw, 1.05rem);
    line-height: 1.65;
    color: rgba(255,255,255,0.9);
    flex: 1;
  }
  #chapter-text p { margin-bottom: 10px; }
  #chapter-text p:last-child { margin-bottom: 0; }

  /* Navigation */
  #nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 12px;
    flex-shrink: 0;
    width: 100%;
    max-width: 600px;
    gap: 12px;
  }

  .nav-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 1.3rem;
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .nav-btn:not(:disabled):active { background: rgba(255,255,255,0.25); }

  #next-btn {
    background: {{ACCENT}};
    border-color: {{ACCENT}};
    color: #000;
    font-weight: 900;
    width: auto;
    border-radius: 16px;
    padding: 0 24px;
    font-size: 0.95rem;
    flex: 1;
    max-width: 200px;
  }
  #next-btn:not(:disabled):active { opacity: 0.8; }

  #dot-row {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
    flex: 1;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active {
    background: {{ACCENT}};
    transform: scale(1.35);
  }

  /* End screen */
  #end-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 50;
    padding: 24px;
    text-align: center;
  }
  #end-emoji { font-size: 4.5rem; }
  #end-text { font-size: 1.6rem; font-weight: 900; color: {{ACCENT}}; }
  #end-sub  { font-size: 1rem; color: rgba(255,255,255,0.65); max-width: 300px; }
  #read-again-btn {
    padding: 16px 40px;
    background: {{ACCENT}};
    border: none;
    border-radius: 16px;
    color: #000;
    font-size: 1.05rem;
    font-weight: 900;
    cursor: pointer;
    touch-action: manipulation;
    margin-top: 8px;
  }

  .confetti-piece {
    position: fixed; border-radius: 2px;
    animation: fall linear forwards; pointer-events: none; z-index: 100;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<script id="chapters-data" type="application/json">{{CHAPTERS}}</script>
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<div id="header">
  <div id="book-title">{{TITLE}}</div>
  <div id="chapter-label">Kap <span id="chap-num">1</span>/<span id="chap-total">5</span></div>
</div>

<div id="story-wrap">
  <div id="story-card">
    <div id="chapter-emoji">📖</div>
    <div id="chapter-title">Laddar...</div>
    <div id="chapter-text"></div>
  </div>
</div>

<div id="nav-row">
  <button class="nav-btn" id="prev-btn" disabled>←</button>
  <div id="dot-row"></div>
  <button class="nav-btn" id="next-btn">Nästa →</button>
</div>

<div id="end-overlay">
  <div id="end-emoji">🎉</div>
  <div id="end-text">Slut!</div>
  <div id="end-sub">Du har läst hela berättelsen!</div>
  <button id="read-again-btn">Läs igen 📖</button>
</div>

<script>
(function () {
  const ACCENT = '{{ACCENT}}';

  // Parse chapters from JSON placeholder (embedded as HTML-escaped data attribute)
  let chapters = [];
  try {
    const raw = document.getElementById('chapters-data').textContent;
    chapters = JSON.parse(raw);
  } catch (e) {
    // Fallback story if JSON parse fails
    chapters = [
      { emoji: '📖', title: 'En gång i tiden...', text: 'Det var en gång ett äventyr som väntade. Hjälten stod redo.' },
      { emoji: '🌟', title: 'Resan börjar', text: 'Med mod i hjärtat gav sig hjälten iväg mot det okända.' },
      { emoji: '⚔️', title: 'Prövningen', text: 'Svårigheter väntade, men hjälten gav inte upp.' },
      { emoji: '🏆', title: 'Segern', text: 'Till slut vann hjälten och alla jublade!' },
      { emoji: '🌈', title: 'Lycklig slut', text: 'Och de levde lyckliga i alla sina dagar. Slut!' },
    ];
  }

  let current = 0;
  let transitioning = false;
  const total = chapters.length;

  const card        = document.getElementById('story-card');
  const emojiEl     = document.getElementById('chapter-emoji');
  const titleEl     = document.getElementById('chapter-title');
  const textEl      = document.getElementById('chapter-text');
  const chapNum     = document.getElementById('chap-num');
  const chapTotal   = document.getElementById('chap-total');
  const progressBar = document.getElementById('progress-bar');
  const prevBtn     = document.getElementById('prev-btn');
  const nextBtn     = document.getElementById('next-btn');
  const dotRow      = document.getElementById('dot-row');

  chapTotal.textContent = total;

  // Build dots
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotRow.appendChild(d);
  }

  function renderChapter(idx, direction) {
    const ch = chapters[idx];
    emojiEl.textContent = ch.emoji || '📖';
    titleEl.textContent = ch.title || '';

    // Support text as string or array of paragraphs
    const paragraphs = Array.isArray(ch.text) ? ch.text : [ch.text];
    textEl.innerHTML = paragraphs.map(p => `<p>${p}</p>`).join('');

    chapNum.textContent = idx + 1;
    progressBar.style.width = ((idx + 1) / total * 100) + '%';

    // Dots
    dotRow.querySelectorAll('.dot').forEach((d, i) => {
      d.classList.toggle('active', i === idx);
    });

    prevBtn.disabled = idx === 0;
    nextBtn.textContent = idx === total - 1 ? 'Slut! 🎉' : 'Nästa →';

    card.scrollTop = 0;
  }

  function goTo(idx, direction) {
    if (transitioning) return;
    transitioning = true;

    card.classList.add(direction === 1 ? 'slide-out' : 'slide-in');

    setTimeout(() => {
      current = idx;
      renderChapter(current, direction);
      card.classList.remove('slide-out', 'slide-in');
      card.style.opacity = '0';
      card.style.transform = direction === 1 ? 'translateX(60px)' : 'translateX(-60px)';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          card.style.transition = 'opacity 0.3s, transform 0.3s';
          card.style.opacity = '1';
          card.style.transform = 'translateX(0)';
          setTimeout(() => {
            card.style.transition = '';
            transitioning = false;
          }, 320);
        });
      });
    }, 300);
  }

  nextBtn.addEventListener('click', () => {
    if (current === total - 1) {
      showEnd();
    } else {
      goTo(current + 1, 1);
    }
  });

  prevBtn.addEventListener('click', () => {
    if (current > 0) goTo(current - 1, -1);
  });

  function showEnd() {
    const overlay = document.getElementById('end-overlay');
    overlay.style.display = 'flex';
    launchConfetti();
    window.parent?.postMessage({ type: 'highscore', score: total }, '*');
  }

  document.getElementById('read-again-btn').addEventListener('click', () => {
    document.getElementById('end-overlay').style.display = 'none';
    goTo(0, -1);
  });

  function launchConfetti() {
    const colors = [ACCENT, '#ffd700', '#ff6b6b', '#51cf66', '#74c0fc'];
    for (let i = 0; i < 50; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-10px';
        el.style.background = colors[i % colors.length];
        el.style.width  = (6 + Math.random() * 8) + 'px';
        el.style.height = (6 + Math.random() * 8) + 'px';
        el.style.animationDuration = (2 + Math.random() * 2) + 's';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4500);
      }, i * 30);
    }
  }

  // Initial render
  renderChapter(0, 1);
})();
</script>
</body>
</html>
