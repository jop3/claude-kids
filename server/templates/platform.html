<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>{{TITLE}}</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; overflow:hidden; display:flex; flex-direction:column;
       align-items:center; justify-content:center; height:100vh;
       font-family:'Arial Rounded MT Bold', Arial, sans-serif; }
canvas { display:block; touch-action:none; }
#ui { position:fixed; top:0; left:0; right:0; display:flex;
      justify-content:space-between; align-items:center;
      padding:10px 18px; pointer-events:none; z-index:10; }
.ui-pill { background:rgba(0,0,0,0.55); border-radius:20px;
           padding:6px 14px; color:#fff; font-size:1.1rem;
           font-weight:bold; letter-spacing:1px; }
#overlay { position:fixed; inset:0; display:flex; flex-direction:column;
           align-items:center; justify-content:center; z-index:20;
           background:rgba(0,0,0,0.75); }
#overlay h1 { font-size:3rem; color:#fff; text-shadow:0 0 20px {{ACCENT}};
              margin-bottom:12px; }
#overlay p  { font-size:1.2rem; color:#ddd; margin-bottom:28px; text-align:center; max-width:320px; }
#overlay button { font-size:1.3rem; font-weight:bold; padding:16px 48px;
                  border:none; border-radius:20px; cursor:pointer;
                  background:{{ACCENT}}; color:#fff;
                  box-shadow:0 4px 20px {{ACCENT}}88;
                  transition:transform 0.1s; }
#overlay button:active { transform:scale(0.95); }
/* touch d-pad */
#dpad { position:fixed; bottom:24px; left:20px; display:none; z-index:15; }
#dpad button { width:64px; height:64px; border-radius:16px; border:none;
               background:rgba(255,255,255,0.18); color:#fff;
               font-size:1.6rem; cursor:pointer; user-select:none;
               -webkit-user-select:none; touch-action:none; }
#dpad button:active { background:rgba(255,255,255,0.38); }
#jump-btn { position:fixed; bottom:24px; right:20px; width:80px; height:80px;
            border-radius:50%; border:none; background:{{ACCENT}}cc;
            color:#fff; font-size:2rem; cursor:pointer; display:none;
            z-index:15; touch-action:none; user-select:none; -webkit-user-select:none; }
#jump-btn:active { background:{{ACCENT}}; }
</style>
</head>
<body>
<div id="ui">
  <div class="ui-pill">⭐ <span id="score">0</span></div>
  <div class="ui-pill" id="level-pill">Nivå 1</div>
  <div class="ui-pill" id="lives-pill">❤️❤️❤️</div>
</div>
<canvas id="c"></canvas>
<div id="dpad">
  <div style="display:grid;grid-template-columns:64px 64px 64px;gap:6px">
    <div></div>
    <button id="btn-up">⬆️</button>
    <div></div>
    <button id="btn-left">⬅️</button>
    <div></div>
    <button id="btn-right">➡️</button>
  </div>
</div>
<button id="jump-btn">🆙</button>
<div id="overlay">
  <h1>{{TITLE}}</h1>
  <p>Piltangenter eller WASD för att röra sig, mellanslag/upp för att hoppa!</p>
  <button id="start-btn">▶ Spela!</button>
</div>
<script>
// ─── CONFIG (injected) ───────────────────────────────────────────────────────
const CFG = {
  title:          "{{TITLE}}",
  worldBg:        ["{{WORLD_BG_TOP}}", "{{WORLD_BG_BOT}}"],
  groundColor:    "{{GROUND_COLOR}}",
  platformColor:  "{{PLATFORM_COLOR}}",
  accentColor:    "{{ACCENT}}",
  playerColor:    "{{PLAYER_COLOR}}",
  playerShape:    "{{PLAYER_SHAPE}}",   // ninja|robot|dino|unicorn|alien|pirate
  enemyColor:     "{{ENEMY_COLOR}}",
  enemyEnabled:   {{ENEMY_ENABLED}},
  enemySpeed:     {{ENEMY_SPEED}},
  gravity:        {{GRAVITY}},
  jumpForce:      {{JUMP_FORCE}},
  moveSpeed:      {{MOVE_SPEED}},
  levelCount:     {{LEVEL_COUNT}},
  coinColor:      "{{COIN_COLOR}}",
  starParticles:  "{{ACCENT}}",
};

// ─── CANVAS SETUP ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() {
  // Use logical CSS pixels — works correctly at any zoom / DPR
  W = document.documentElement.clientWidth;
  H = document.documentElement.clientHeight;
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
}
resize();
window.addEventListener('resize', () => { resize(); if (state !== 'title' && levelData) initLevel(level); });

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = 'title'; // title | playing | dead | win | levelup
let score = 0, lives = 3, level = 1;
let particles = [], floatingTexts = [];

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',   e => { keys[e.code] = false; });

function isLeft()  { return keys['ArrowLeft']  || keys['KeyA']; }
function isRight() { return keys['ArrowRight'] || keys['KeyD']; }
function isJump()  { return keys['ArrowUp'] || keys['KeyW'] || keys['Space']; }

// Touch d-pad
const touch = { left:false, right:false, jump:false };
function setupTouch() {
  if (!('ontouchstart' in window)) return;
  document.getElementById('dpad').style.display = 'block';
  document.getElementById('jump-btn').style.display = 'block';
  function btn(id, prop) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); touch[prop]=true; }, {passive:false});
    el.addEventListener('touchend',   e => { e.preventDefault(); touch[prop]=false; }, {passive:false});
  }
  btn('btn-left','left'); btn('btn-right','right'); btn('btn-up','jump');
  const jb = document.getElementById('jump-btn');
  jb.addEventListener('touchstart', e => { e.preventDefault(); touch.jump=true; }, {passive:false});
  jb.addEventListener('touchend',   e => { e.preventDefault(); touch.jump=false; }, {passive:false});
}
setupTouch();
function inputLeft()  { return isLeft()  || touch.left;  }
function inputRight() { return isRight() || touch.right; }
function inputJump()  { return isJump()  || touch.jump;  }

// ─── LEVEL GENERATOR ─────────────────────────────────────────────────────────
// Returns { platforms, enemies, coins, goal }
// All coordinates in "world space" (wider than screen)
function generateLevel(lvl) {
  const WORLD_W = W * 3.5;
  const FLOOR_Y = H - 60;
  const platforms = [];
  const enemies   = [];
  const coins     = [];

  // Floor segments with gaps
  let x = 0;
  while (x < WORLD_W) {
    const segW = 180 + Math.random() * 220;
    platforms.push({ x, y: FLOOR_Y, w: segW, h: 60, isFloor: true });
    x += segW + (lvl > 1 ? 80 + Math.random()*80 : 40 + Math.random()*60);
  }

  // Floating platforms — density increases with level
  const platCount = 12 + lvl * 4;
  const spacing   = (WORLD_W - 300) / platCount;
  for (let i = 0; i < platCount; i++) {
    const px = 200 + i * spacing + Math.random() * spacing * 0.5;
    const py = FLOOR_Y - 120 - Math.random() * (H * 0.45);
    const pw = 90 + Math.random() * 80;
    platforms.push({ x: px, y: py, w: pw, h: 16 });

    // Coin above platform
    if (Math.random() > 0.35) {
      coins.push({ x: px + pw/2 - 10, y: py - 36, w: 20, h: 20,
                   collected: false, bobOffset: Math.random()*Math.PI*2 });
    }

    // Enemy on platform
    if (CFG.enemyEnabled && Math.random() < 0.25 + lvl*0.05) {
      enemies.push({ x: px + 10, y: py - 32, w: 28, h: 28,
                     vx: CFG.enemySpeed * (Math.random()<0.5?1:-1),
                     patrolLeft: px, patrolRight: px + pw - 30,
                     alive: true });
    }
  }

  // Goal flag at the end
  const goal = { x: WORLD_W - 120, y: FLOOR_Y - 80, w: 40, h: 80 };

  return { platforms, enemies, coins, goal, worldW: WORLD_W, floorY: FLOOR_Y };
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
let player, cam, levelData;
let jumpPressed = false, canJump = false, jumpBuffer = 0, coyoteTime = 0;

function initLevel(lvl) {
  const d = generateLevel(lvl);
  levelData = d;
  player = { x: 80, y: d.floorY - 48, w: 32, h: 44,
             vx: 0, vy: 0, onGround: false, facing: 1, animFrame: 0, animT: 0 };
  cam    = { x: 0 };
  jumpPressed = false;
  canJump = false;
  jumpBuffer  = 0;
  coyoteTime  = 0;
  document.getElementById('level-pill').textContent = 'Nivå ' + lvl;
}

function updateLives() {
  document.getElementById('lives-pill').textContent =
    '❤️'.repeat(Math.max(0, lives)) + '🖤'.repeat(Math.max(0, 3 - lives));
}

// ─── PHYSICS ─────────────────────────────────────────────────────────────────
const GRAV     = CFG.gravity;
const JUMP_V   = -CFG.jumpForce;
const MOVE_SPD = CFG.moveSpeed;

function rectOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function updatePlayer(dt) {
  // Horizontal
  if (inputLeft())  { player.vx = -MOVE_SPD; player.facing = -1; }
  else if (inputRight()) { player.vx = MOVE_SPD; player.facing = 1; }
  else { player.vx *= 0.82; }

  // Jump — buffer + coyote time for forgiving feel
  if (inputJump()) {
    if (!jumpPressed) { jumpBuffer = 120; }
    jumpPressed = true;
  } else {
    jumpPressed = false;
  }
  jumpBuffer  = Math.max(0, jumpBuffer - dt);
  coyoteTime  = Math.max(0, coyoteTime - dt);

  if (jumpBuffer > 0 && (player.onGround || coyoteTime > 0)) {
    player.vy = JUMP_V;
    jumpBuffer = 0;
    coyoteTime = 0;
    playSound('jump');
  }

  // Variable jump height — release early = shorter jump
  if (!inputJump() && player.vy < -4) player.vy += 1.2;

  // Gravity
  player.vy = Math.min(player.vy + GRAV, 22);

  // Move X
  player.x += player.vx;

  // Collide X with platforms
  const wasOnGround = player.onGround;
  player.onGround = false;
  for (const p of levelData.platforms) {
    if (rectOverlap(player, p)) {
      if (player.vx > 0) player.x = p.x - player.w;
      else if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }

  // Move Y
  player.y += player.vy;

  // Collide Y with platforms
  for (const p of levelData.platforms) {
    if (rectOverlap(player, p)) {
      if (player.vy > 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
        coyoteTime = 100;
      } else if (player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  if (wasOnGround && !player.onGround) coyoteTime = 100; // started falling

  // Animate legs
  if (Math.abs(player.vx) > 0.5) {
    player.animT += dt;
    if (player.animT > 160) { player.animFrame = (player.animFrame+1)%4; player.animT=0; }
  } else { player.animFrame = 0; }

  // Camera — smooth follow with look-ahead
  const targetCamX = player.x - W * 0.35 + player.vx * 6;
  cam.x += (targetCamX - cam.x) * 0.1;
  cam.x = Math.max(0, Math.min(cam.x, levelData.worldW - W));

  // Fall into pit
  if (player.y > H + 100) loseLife();

  // Left wall
  if (player.x < 0) { player.x = 0; player.vx = 0; }
}

function updateEnemies(dt) {
  for (const e of levelData.enemies) {
    if (!e.alive) continue;
    e.x += e.vx;
    if (e.x <= e.patrolLeft || e.x + e.w >= e.patrolRight) e.vx *= -1;

    // Player stomps enemy
    if (rectOverlap(player, e)) {
      const playerBottom = player.y + player.h;
      const enemyTop     = e.y;
      if (player.vy > 0 && playerBottom < enemyTop + 18) {
        e.alive = false;
        player.vy = JUMP_V * 0.6;
        addScore(50, e.x - cam.x, e.y);
        spawnParticles(e.x + e.w/2, e.y + e.h/2, CFG.enemyColor, 8);
        playSound('stomp');
      } else {
        loseLife();
      }
    }
  }
}

function updateCoins(t) {
  for (const c of levelData.coins) {
    if (c.collected) continue;
    if (rectOverlap(player, { x:c.x, y:c.y + Math.sin(t/400+c.bobOffset)*5, w:c.w, h:c.h })) {
      c.collected = true;
      addScore(10, c.x - cam.x, c.y);
      spawnParticles(c.x + c.w/2, c.y + c.h/2, CFG.coinColor, 6);
      playSound('coin');
    }
  }
}

function checkGoal() {
  if (rectOverlap(player, levelData.goal)) {
    if (level < CFG.levelCount) {
      level++;
      state = 'levelup';
      addScore(200, W/2, H/2);
      spawnParticles(W/2, H/2, CFG.accentColor, 30);
      playSound('win');
      setTimeout(() => { initLevel(level); state = 'playing'; }, 1800);
    } else {
      state = 'win';
      spawnParticles(W/2, H/2, CFG.accentColor, 40);
      playSound('win');
      showOverlay('🏆 Klart!', 'Du klarade alla ' + CFG.levelCount + ' nivåer!<br>Poäng: ' + score, 'Spela igen!');
    }
  }
}

// ─── SCORING + FX ────────────────────────────────────────────────────────────
function addScore(pts, sx, sy) {
  score += pts;
  document.getElementById('score').textContent = score;
  floatingTexts.push({ x: sx, y: sy, text: '+'+pts, life: 1, vy: -1.5 });
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 2,
                     color, r: 4+Math.random()*4, life: 1 });
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= dt/600;
  }
  particles = particles.filter(p => p.life > 0);
  for (const t of floatingTexts) {
    t.y += t.vy; t.life -= dt/900;
  }
  floatingTexts = floatingTexts.filter(t => t.life > 0);
}

// ─── LOSE LIFE ───────────────────────────────────────────────────────────────
let invincible = 0;
function loseLife() {
  if (invincible > 0) return;
  lives--;
  updateLives();
  playSound('hurt');
  invincible = 2000;
  spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff4444', 12);
  if (lives <= 0) {
    state = 'dead';
    showOverlay('💀 Game Over', 'Poäng: ' + score, 'Försök igen!');
  } else {
    // Respawn at start of level
    player.x = 80; player.y = levelData.floorY - 48;
    player.vx = 0; player.vy = 0;
    cam.x = 0;
  }
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawBackground() {
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, CFG.worldBg[0]);
  grad.addColorStop(1, CFG.worldBg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Parallax stars/clouds layer (scrolls at 0.3x)
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#fff';
  const starSeed = 42;
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 137.5 + starSeed) % (W * 3)) - (cam.x * 0.3) % (W * 3);
    const sy = (i * 73.1) % (H * 0.8);
    const sr = 1 + (i % 3);
    ctx.beginPath(); ctx.arc(((sx % W) + W) % W, sy, sr, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawPlatform(p) {
  const sx = p.x - cam.x;
  if (sx + p.w < 0 || sx > W) return; // cull off-screen

  if (p.isFloor) {
    // Floor with grass top
    ctx.fillStyle = CFG.groundColor;
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = lighten(CFG.groundColor, 40);
    ctx.fillRect(sx, p.y, p.w, 8);
    // Texture lines
    ctx.strokeStyle = darken(CFG.groundColor, 20);
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.3;
    for (let tx = sx % 32; tx < sx + p.w; tx += 32) {
      ctx.beginPath(); ctx.moveTo(tx, p.y+8); ctx.lineTo(tx, p.y+p.h); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  } else {
    // Floating platform — rounded pill shape
    ctx.fillStyle = CFG.platformColor;
    roundRect(ctx, sx, p.y, p.w, p.h, 8);
    ctx.fill();
    ctx.fillStyle = lighten(CFG.platformColor, 30);
    roundRect(ctx, sx+4, p.y+2, p.w-8, 4, 3);
    ctx.fill();
  }
}

function drawCoin(c, t) {
  if (c.collected) return;
  const sx = c.x - cam.x;
  if (sx + c.w < -10 || sx > W+10) return;
  const bob = Math.sin(t/400 + c.bobOffset) * 5;
  const sy  = c.y + bob;

  // Glow
  ctx.save();
  ctx.shadowColor = CFG.coinColor; ctx.shadowBlur = 10;
  ctx.fillStyle = CFG.coinColor;
  ctx.beginPath(); ctx.arc(sx + c.w/2, sy + c.h/2, c.w/2, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(sx + c.w/2 - 3, sy + c.h/2 - 3, 3, 0, Math.PI*2); ctx.fill();
  // Star inside
  ctx.fillStyle = '#fff';
  ctx.font = `${c.w*0.75}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('⭐', sx + c.w/2, sy + c.h/2 + 1);
}

function drawEnemy(e) {
  if (!e.alive) return;
  const sx = e.x - cam.x;
  if (sx + e.w < -20 || sx > W+20) return;

  ctx.save();
  ctx.fillStyle = CFG.enemyColor;
  // Body
  ctx.beginPath(); ctx.arc(sx + e.w/2, e.y + e.h/2, e.w/2, 0, Math.PI*2); ctx.fill();
  // Eyes (angry)
  const eyeDir = e.vx > 0 ? 1 : -1;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(sx + e.w/2 + eyeDir*6, e.y + e.h*0.35, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(sx + e.w/2 + eyeDir*7, e.y + e.h*0.35, 2.5, 0, Math.PI*2); ctx.fill();
  // Angry brow
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(sx + e.w/2 + eyeDir*2,  e.y + e.h*0.22);
  ctx.lineTo(sx + e.w/2 + eyeDir*10, e.y + e.h*0.28);
  ctx.stroke();
  ctx.restore();
}

function drawGoal() {
  const g  = levelData.goal;
  const sx = g.x - cam.x;
  if (sx > W + 10) return;
  // Pole
  ctx.fillStyle = '#aaa';
  ctx.fillRect(sx + g.w/2 - 3, g.y, 6, g.h);
  // Flag (waving)
  const wave = Math.sin(Date.now()/300) * 4;
  ctx.fillStyle = CFG.accentColor;
  ctx.beginPath();
  ctx.moveTo(sx + g.w/2 + 3,        g.y + 4);
  ctx.lineTo(sx + g.w/2 + 38 + wave, g.y + 18);
  ctx.lineTo(sx + g.w/2 + 3,        g.y + 32);
  ctx.fill();
  // Star on flag
  ctx.fillStyle = '#fff';
  ctx.font = '18px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('⭐', sx + g.w/2 + 20 + wave/2, g.y + 18);
}

function drawPlayer(t) {
  const sx = player.x - cam.x;
  const sy = player.y;
  ctx.save();
  ctx.translate(sx + player.w/2, sy + player.h/2);
  ctx.scale(player.facing, 1);

  // Invincibility flicker
  if (invincible > 0 && Math.floor(Date.now()/80)%2===0) {
    ctx.globalAlpha = 0.3;
  }

  drawCharacter(ctx, 0, 0, player.w, player.h, player.animFrame, player.onGround);
  ctx.restore();
}

function drawCharacter(ctx, cx, cy, w, h, frame, onGround) {
  const shape = CFG.playerShape;
  const c     = CFG.playerColor;
  const legSwing = [0, 10, 0, -10][frame] || 0;

  if (shape === 'robot') {
    // Square robot
    ctx.fillStyle = c;
    roundRect(ctx, cx - w*0.4, cy - h*0.45, w*0.8, h*0.5, 6); ctx.fill();
    ctx.fillStyle = darken(c, 20);
    roundRect(ctx, cx - w*0.3, cy, w*0.6, h*0.45, 4); ctx.fill();
    // Eyes
    ctx.fillStyle = '#0ff'; ctx.shadowColor='#0ff'; ctx.shadowBlur=6;
    ctx.fillRect(cx - w*0.2, cy - h*0.32, w*0.12, w*0.12);
    ctx.fillRect(cx + w*0.08, cy - h*0.32, w*0.12, w*0.12);
    ctx.shadowBlur = 0;
    // Legs
    ctx.fillStyle = darken(c, 30);
    ctx.fillRect(cx - w*0.22, cy + h*0.46, w*0.18, h*0.25 + (onGround ? legSwing : 0));
    ctx.fillRect(cx + w*0.04, cy + h*0.46, w*0.18, h*0.25 - (onGround ? legSwing : 0));
    // Antenna
    ctx.strokeStyle = '#0ff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx, cy-h*0.45); ctx.lineTo(cx, cy-h*0.65); ctx.stroke();
    ctx.fillStyle='#0ff'; ctx.beginPath(); ctx.arc(cx, cy-h*0.65, 3, 0, Math.PI*2); ctx.fill();

  } else if (shape === 'dino') {
    // Round dino
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(cx, cy - h*0.1, w*0.42, 0, Math.PI*2); ctx.fill();
    // Snout
    ctx.fillStyle = lighten(c, 20);
    ctx.beginPath(); ctx.ellipse(cx + w*0.38, cy - h*0.08, w*0.18, w*0.14, 0, 0, Math.PI*2); ctx.fill();
    // Eye
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx + w*0.2, cy - h*0.22, w*0.12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(cx + w*0.23, cy - h*0.22, w*0.06, 0, Math.PI*2); ctx.fill();
    // Spikes
    ctx.fillStyle = darken(c, 30);
    for (let i = 0; i < 3; i++) {
      const sx2 = cx - w*0.25 + i*w*0.2;
      ctx.beginPath(); ctx.moveTo(sx2, cy-h*0.48); ctx.lineTo(sx2+w*0.08, cy-h*0.62); ctx.lineTo(sx2+w*0.16, cy-h*0.48); ctx.fill();
    }
    // Legs
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.ellipse(cx - w*0.2, cy + h*0.38 + legSwing*0.5, w*0.13, h*0.2, -0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w*0.2, cy + h*0.38 - legSwing*0.5, w*0.13, h*0.2, 0.2, 0, Math.PI*2); ctx.fill();

  } else if (shape === 'unicorn') {
    // Round unicorn
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(cx, cy - h*0.1, w*0.42, 0, Math.PI*2); ctx.fill();
    // Horn
    ctx.fillStyle = '#ff69b4';
    ctx.beginPath(); ctx.moveTo(cx - w*0.05, cy - h*0.48);
    ctx.lineTo(cx + w*0.05, cy - h*0.48); ctx.lineTo(cx, cy - h*0.72); ctx.fill();
    // Rainbow mane
    const maneColors = ['#ff0080','#ff8000','#ffff00','#00ff80','#0080ff'];
    maneColors.forEach((mc, mi) => {
      ctx.fillStyle = mc;
      ctx.beginPath(); ctx.arc(cx - w*0.28 - mi*4, cy - h*0.18 - mi*3, 6, 0, Math.PI*2); ctx.fill();
    });
    // Eye + lash
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx + w*0.18, cy - h*0.18, w*0.1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(cx + w*0.2, cy - h*0.18, w*0.05, 0, Math.PI*2); ctx.fill();
    // Legs
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.ellipse(cx - w*0.18, cy + h*0.35 + legSwing*0.4, w*0.1, h*0.22, -0.1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w*0.18, cy + h*0.35 - legSwing*0.4, w*0.1, h*0.22, 0.1, 0, Math.PI*2); ctx.fill();

  } else if (shape === 'alien') {
    // Oval alien
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.ellipse(cx, cy - h*0.1, w*0.4, w*0.44, 0, 0, Math.PI*2); ctx.fill();
    // Big eyes
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(cx - w*0.16, cy - h*0.18, w*0.14, w*0.1, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w*0.16, cy - h*0.18, w*0.14, w*0.1,  0.3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#9f0';
    ctx.beginPath(); ctx.ellipse(cx - w*0.16, cy - h*0.2, w*0.07, w*0.06, -0.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx + w*0.16, cy - h*0.2, w*0.07, w*0.06,  0.3, 0, Math.PI*2); ctx.fill();
    // Antennae
    ctx.strokeStyle = c; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx - w*0.15, cy - h*0.5); ctx.lineTo(cx - w*0.3, cy - h*0.7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + w*0.15, cy - h*0.5); ctx.lineTo(cx + w*0.3, cy - h*0.7); ctx.stroke();
    ctx.fillStyle = '#9f0';
    ctx.beginPath(); ctx.arc(cx - w*0.3, cy - h*0.7, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + w*0.3, cy - h*0.7, 4, 0, Math.PI*2); ctx.fill();
    // Tentacle legs
    ctx.strokeStyle = c; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx - w*0.18, cy + h*0.32);
    ctx.quadraticCurveTo(cx - w*0.28, cy + h*0.45 + legSwing*0.5, cx - w*0.22, cy + h*0.55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + w*0.18, cy + h*0.32);
    ctx.quadraticCurveTo(cx + w*0.28, cy + h*0.45 - legSwing*0.5, cx + w*0.22, cy + h*0.55); ctx.stroke();

  } else if (shape === 'pirate') {
    // Pirate
    ctx.fillStyle = '#f5cba7';
    ctx.beginPath(); ctx.arc(cx, cy - h*0.18, w*0.36, 0, Math.PI*2); ctx.fill();
    // Hat
    ctx.fillStyle = '#1a1a1a';
    roundRect(ctx, cx - w*0.4, cy - h*0.52, w*0.8, h*0.24, 4); ctx.fill();
    ctx.fillRect(cx - w*0.48, cy - h*0.34, w*0.96, h*0.1);
    ctx.fillStyle = '#e74c3c';
    ctx.fillRect(cx - w*0.3, cy - h*0.5, w*0.6, h*0.06);
    // Skull on hat
    ctx.fillStyle = '#fff'; ctx.font = `${w*0.4}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('☠', cx, cy - h*0.44);
    // Eye patch
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(cx - w*0.14, cy - h*0.24, w*0.1, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#111'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx - w*0.26, cy - h*0.28); ctx.lineTo(cx - w*0.02, cy - h*0.2); ctx.stroke();
    // Good eye
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx + w*0.14, cy - h*0.22, w*0.1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = c; ctx.beginPath(); ctx.arc(cx + w*0.14, cy - h*0.22, w*0.055, 0, Math.PI*2); ctx.fill();
    // Body
    ctx.fillStyle = c;
    roundRect(ctx, cx - w*0.3, cy + h*0.02, w*0.6, h*0.38, 6); ctx.fill();
    // Legs
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(cx - w*0.24, cy + h*0.4, w*0.2, h*0.28 + legSwing);
    ctx.fillRect(cx + w*0.04, cy + h*0.4, w*0.2, h*0.28 - legSwing);

  } else {
    // Default: Ninja
    // Body
    ctx.fillStyle = c;
    roundRect(ctx, cx - w*0.3, cy - h*0.1, w*0.6, h*0.52, 8); ctx.fill();
    // Head
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(cx, cy - h*0.26, w*0.36, 0, Math.PI*2); ctx.fill();
    // Mask (dark band across eyes)
    ctx.fillStyle = '#111';
    ctx.fillRect(cx - w*0.32, cy - h*0.36, w*0.64, h*0.14);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx - w*0.12, cy - h*0.3, w*0.09, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + w*0.12, cy - h*0.3, w*0.09, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(cx - w*0.1,  cy - h*0.3, w*0.045, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + w*0.14, cy - h*0.3, w*0.045, 0, Math.PI*2); ctx.fill();
    // Headband
    ctx.fillStyle = lighten(c, 40);
    ctx.fillRect(cx - w*0.36, cy - h*0.46, w*0.72, h*0.1);
    // Legs
    ctx.fillStyle = '#111';
    ctx.fillRect(cx - w*0.22, cy + h*0.42, w*0.19, h*0.28 + legSwing);
    ctx.fillRect(cx + w*0.03, cy + h*0.42, w*0.19, h*0.28 - legSwing);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 18px Arial';
  for (const t of floatingTexts) {
    ctx.globalAlpha = Math.max(0, t.life);
    ctx.fillStyle = CFG.coinColor;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillText(t.text, t.x, t.y);
  }
  ctx.restore();
}

function drawLevelUp() {
  ctx.save();
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${H*0.1}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = CFG.accentColor; ctx.shadowBlur = 30;
  ctx.fillText('Nivå ' + level + '! 🎉', W/2, H/2);
  ctx.restore();
}

// ─── SOUND ───────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  try {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    const now = AC.currentTime;
    if (type === 'jump') {
      o.type = 'square'; o.frequency.setValueAtTime(220, now);
      o.frequency.exponentialRampToValueAtTime(440, now+0.08);
      g.gain.setValueAtTime(0.15, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.15);
      o.start(now); o.stop(now+0.15);
    } else if (type === 'coin') {
      o.type = 'sine'; o.frequency.setValueAtTime(660, now);
      o.frequency.exponentialRampToValueAtTime(1320, now+0.07);
      g.gain.setValueAtTime(0.2, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.12);
      o.start(now); o.stop(now+0.12);
    } else if (type === 'stomp') {
      o.type = 'sawtooth'; o.frequency.setValueAtTime(200, now);
      o.frequency.exponentialRampToValueAtTime(80, now+0.1);
      g.gain.setValueAtTime(0.25, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.15);
      o.start(now); o.stop(now+0.15);
    } else if (type === 'hurt') {
      o.type = 'sawtooth'; o.frequency.setValueAtTime(440, now);
      o.frequency.exponentialRampToValueAtTime(110, now+0.3);
      g.gain.setValueAtTime(0.3, now); g.gain.exponentialRampToValueAtTime(0.001, now+0.3);
      o.start(now); o.stop(now+0.3);
    } else if (type === 'win') {
      [523,659,784,1047].forEach((f,i) => {
        const o2 = AC.createOscillator(); const g2 = AC.createGain();
        o2.connect(g2); g2.connect(AC.destination);
        o2.type = 'sine'; o2.frequency.value = f;
        g2.gain.setValueAtTime(0, now+i*0.12);
        g2.gain.linearRampToValueAtTime(0.2, now+i*0.12+0.05);
        g2.gain.exponentialRampToValueAtTime(0.001, now+i*0.12+0.25);
        o2.start(now+i*0.12); o2.stop(now+i*0.12+0.25);
      });
      return;
    }
  } catch(e) {}
}

// ─── OVERLAY ─────────────────────────────────────────────────────────────────
function showOverlay(title, text, btnText) {
  const ov = document.getElementById('overlay');
  ov.innerHTML = `<h1>${title}</h1><p>${text}</p><button id="start-btn">${btnText}</button>`;
  ov.style.display = 'flex';
  document.getElementById('start-btn').onclick = startGame;
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

function startGame() {
  hideOverlay();
  score = 0; lives = 3; level = 1;
  document.getElementById('score').textContent = '0';
  updateLives();
  initLevel(1);
  state = 'playing';
  AC.resume();
}

document.getElementById('start-btn').onclick = startGame;

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let lastT = 0;
function loop(t) {
  const dt = Math.min(t - lastT, 50); // cap dt to avoid spiral of death
  lastT = t;

  if (state === 'playing') {
    invincible = Math.max(0, invincible - dt);
    updatePlayer(dt);
    updateEnemies(dt);
    updateCoins(t);
    updateParticles(dt);
    checkGoal();
  }

  // Draw
  drawBackground();
  if (state !== 'title') {
    levelData.platforms.forEach(drawPlatform);
    levelData.coins.forEach(c => drawCoin(c, t));
    levelData.enemies.forEach(drawEnemy);
    drawGoal();
    drawPlayer(t);
    drawParticles();
    if (state === 'levelup') drawLevelUp();
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function lighten(hex, amt) {
  try {
    let [r,g,b] = hexToRgb(hex);
    return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
  } catch { return hex; }
}
function darken(hex, amt) {
  try {
    let [r,g,b] = hexToRgb(hex);
    return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
  } catch { return hex; }
}
