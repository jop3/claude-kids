<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClaudeKids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --accent: #e94560;
      --accent2: #533483;
      --green: #2ecc71;
      --text: #eee;
      --text-dim: #889;
      --radius: 16px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
    header .sub { font-size: 13px; opacity: 0.8; }

    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Chat panel ── */
    .chat-panel {
      width: 400px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 2px solid var(--surface2);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

    .msg {
      max-width: 92%;
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: var(--surface2);
      border-bottom-left-radius: 4px;
    }
    .msg.action {
      align-self: flex-start;
      background: transparent;
      color: var(--text-dim);
      font-size: 13px;
      padding: 2px 6px;
      font-style: italic;
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      padding: 10px 14px;
      background: var(--surface2);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text-dim);
    }
    .dots span { animation: blink 1.4s infinite; }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,60%,100%{opacity:.2} 30%{opacity:1} }

    /* Input */
    .input-area {
      padding: 10px 14px;
      background: var(--surface);
      border-top: 2px solid var(--surface2);
      display: flex;
      gap: 8px;
    }
    .input-area input {
      flex: 1;
      padding: 11px 16px;
      border: 2px solid var(--surface2);
      border-radius: 24px;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color .2s;
    }
    .input-area input:focus { border-color: var(--accent); }
    .input-area input::placeholder { color: var(--text-dim); }
    .input-area button {
      padding: 11px 18px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .1s, opacity .2s;
    }
    .input-area button:hover { transform: scale(1.05); }
    .input-area button:active { transform: scale(0.95); }
    .input-area button:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── Preview panel ── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .preview-toolbar {
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 2px solid var(--surface2);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .preview-toolbar select {
      flex: 1;
      padding: 6px 10px;
      background: var(--bg);
      color: var(--text);
      border: 2px solid var(--surface2);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .preview-toolbar button {
      padding: 6px 12px;
      background: var(--surface2);
      color: var(--text);
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .preview-toolbar button:hover { background: var(--accent2); }
    .preview-toolbar .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      display: none;
      animation: pulse 1s infinite;
    }
    .preview-toolbar .dot.visible { display: block; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .preview-frame {
      flex: 1;
      position: relative;
      background: white;
    }
    .preview-frame iframe {
      width: 100%; height: 100%; border: none;
    }

    .preview-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      background: var(--bg);
      text-align: center;
      color: var(--text-dim);
      padding: 40px;
    }
    .preview-empty h2 { font-size: 26px; margin-bottom: 10px; color: var(--text); }
    .preview-empty p { font-size: 15px; line-height: 1.7; }

    .starters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 20px;
      justify-content: center;
    }
    .starters button {
      padding: 9px 16px;
      background: var(--surface2);
      color: var(--text);
      border: 2px solid transparent;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
    }
    .starters button:hover { border-color: var(--accent); transform: translateY(-2px); }

    .layout.fullscreen .chat-panel { display: none; }
  </style>
</head>
<body>

<header>
  <h1>ClaudeKids</h1>
  <span class="sub">Skapa coola grejer med AI!</span>
</header>

<div class="layout" id="layout">

  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="input" placeholder="Vad vill du skapa?" autocomplete="off">
      <button id="sendBtn">Skicka</button>
    </div>
  </div>

  <div class="preview-panel">
    <div class="preview-toolbar" id="toolbar" style="display:none">
      <div class="dot" id="liveDot"></div>
      <select id="fileSelect" onchange="loadSelectedFile()"></select>
      <button onclick="reloadPreview()">Starta om</button>
      <button onclick="toggleFullscreen()">Fullskarm</button>
    </div>
    <div class="preview-frame" id="previewFrame">
      <div class="preview-empty" id="emptyState">
        <div>
          <h2>Vad vill du skapa?</h2>
          <p>Skriv i chatten vad du vill gora!<br>Spel, animationer, konst — allt gar!</p>
          <div class="starters">
            <button onclick="starter(this)">Gora ett rymdspel</button>
            <button onclick="starter(this)">Rita en regnbage</button>
            <button onclick="starter(this)">Bygga en labyrint</button>
            <button onclick="starter(this)">Gora en rolig animation</button>
            <button onclick="starter(this)">Skapa ett minne-spel</button>
            <button onclick="starter(this)">Bygga en trummaskin</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('sendBtn');
const toolbar    = document.getElementById('toolbar');
const fileSelect = document.getElementById('fileSelect');
const liveDot    = document.getElementById('liveDot');
const emptyState = document.getElementById('emptyState');
const previewFrame = document.getElementById('previewFrame');
const layoutEl   = document.getElementById('layout');

let sessionId = null;
let streaming  = false;
let currentFile = null;

// ── Messages ──

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typing';
  div.innerHTML = '<span class="dots"><span>●</span><span>●</span><span>●</span></span> Tanker...';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

// ── Preview ──

function showPreview(filename) {
  currentFile = filename;
  emptyState.style.display = 'none';
  toolbar.style.display = 'flex';

  // Remove old iframe
  previewFrame.querySelector('iframe')?.remove();

  const iframe = document.createElement('iframe');
  iframe.sandbox = 'allow-scripts allow-same-origin';
  iframe.src = `/preview/${filename}?t=${Date.now()}`;
  previewFrame.appendChild(iframe);

  // Update file select
  updateFileSelect(filename);
}

function reloadPreview() { if (currentFile) showPreview(currentFile); }
function toggleFullscreen() { layoutEl.classList.toggle('fullscreen'); }

async function updateFileSelect(active) {
  const res = await fetch('/api/files');
  const files = await res.json();
  fileSelect.innerHTML = '';
  for (const f of files) {
    const opt = document.createElement('option');
    opt.value = f.name;
    opt.textContent = f.name;
    if (f.name === active) opt.selected = true;
    fileSelect.appendChild(opt);
  }
  if (files.length > 0) toolbar.style.display = 'flex';
}

function loadSelectedFile() { showPreview(fileSelect.value); }

// ── Send ──

async function send() {
  const text = inputEl.value.trim();
  if (!text || streaming) return;
  inputEl.value = '';
  streaming = true;
  sendBtn.disabled = true;
  liveDot.classList.add('visible');

  addMsg('user', text);
  showTyping();

  let assistantDiv = null;
  let assistantText = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, sessionId }),
    });

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });

      const lines = buf.split('\n');
      buf = lines.pop(); // incomplete line stays in buffer

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const ev = JSON.parse(line.slice(6));
          handleEvent(ev);
        } catch {}
      }
    }
  } catch (err) {
    hideTyping();
    addMsg('assistant', 'Oj! Nagot gick fel. Forsok igen!');
    console.error(err);
  }

  streaming = false;
  sendBtn.disabled = false;
  liveDot.classList.remove('visible');
  inputEl.focus();

  function handleEvent(ev) {
    if (ev.type === 'session') {
      sessionId = ev.sessionId;
    }
    else if (ev.type === 'text') {
      hideTyping();
      if (!assistantDiv) {
        assistantDiv = addMsg('assistant', '');
      }
      assistantText += ev.text;
      assistantDiv.textContent = assistantText;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    else if (ev.type === 'action') {
      // Show ephemeral action line, remove previous one
      document.querySelector('.msg.action')?.remove();
      addMsg('action', ev.text);
    }
    else if (ev.type === 'file') {
      // New/changed HTML file — show it immediately
      document.querySelector('.msg.action')?.remove();
      showPreview(ev.file);
    }
    else if (ev.type === 'done') {
      hideTyping();
      document.querySelector('.msg.action')?.remove();
      // Refresh file list in dropdown
      updateFileSelect(currentFile);
    }
    else if (ev.type === 'error') {
      hideTyping();
      addMsg('assistant', ev.text);
    }
  }
}

function starter(btn) { inputEl.value = btn.textContent; send(); }

sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

// Load existing files on startup
updateFileSelect(null);
inputEl.focus();
</script>

</body>
</html>
