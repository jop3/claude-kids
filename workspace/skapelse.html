<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritprogram - Neon Landskap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .toolbar {
            background: #1a1a1a;
            border-right: 2px solid #00FF00;
            padding: 10px;
            width: 100px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .toolbar-section {
            border-bottom: 1px solid #00FF00;
            padding-bottom: 10px;
        }

        .toolbar-section:last-child {
            border-bottom: none;
        }

        .tool-btn {
            background: #222;
            border: 2px solid #444;
            color: #fff;
            padding: 8px 4px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 11px;
            transition: all 0.2s;
            text-align: center;
            white-space: normal;
            line-height: 1.2;
        }

        .tool-btn:hover {
            border-color: #00FF00;
        }

        .tool-btn.active {
            background: #00FF00;
            color: #000;
            border-color: #00FF00;
            box-shadow: 0 0 10px #00FF00;
        }

        .color-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }

        .color-btn {
            width: 100%;
            height: 30px;
            border: 2px solid #444;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .color-btn:hover {
            border-color: #fff;
            box-shadow: 0 0 8px currentColor;
        }

        .color-btn.active {
            border: 3px solid #fff;
            box-shadow: 0 0 15px currentColor;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slider-label {
            font-size: 10px;
            color: #00FF00;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .canvas-container {
            flex: 1;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a2a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        canvas {
            border: 2px solid #00FF00;
            background: #000;
            cursor: crosshair;
            max-width: 100%;
            max-height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        .info {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: #00FF00;
            text-shadow: 0 0 10px #00FF00;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-section">
            <h4 style="font-size: 12px; margin-bottom: 8px; color: #00FF00;">VERKTYG</h4>
            <button class="tool-btn active" data-tool="pen" title="Penna">Penna</button>
            <button class="tool-btn" data-tool="eraser" title="Suddgummi">Sudd</button>
            <button class="tool-btn" data-tool="bucket" title="Fyllning">Fylld</button>
            <button class="tool-btn" data-tool="line" title="Linje">Linje</button>
            <button class="tool-btn" data-tool="rect" title="Rektangel">Fyrkant</button>
            <button class="tool-btn" data-tool="circle" title="Cirkel">Cirkel</button>
        </div>

        <div class="toolbar-section">
            <h4 style="font-size: 12px; margin-bottom: 8px; color: #00FF00;">FÄRGER</h4>
            <div class="color-grid">
                <button class="color-btn active" style="background: #00FF00;" data-color="#00FF00" title="Neon Grön"></button>
                <button class="color-btn" style="background: #FF00FF;" data-color="#FF00FF" title="Neon Magenta"></button>
                <button class="color-btn" style="background: #00FFFF;" data-color="#00FFFF" title="Neon Cyan"></button>
                <button class="color-btn" style="background: #FFFF00;" data-color="#FFFF00" title="Neon Gul"></button>
                <button class="color-btn" style="background: #FF0080;" data-color="#FF0080" title="Neon Rosa"></button>
                <button class="color-btn" style="background: #FF8000;" data-color="#FF8000" title="Neon Orange"></button>
                <button class="color-btn" style="background: #0080FF;" data-color="#0080FF" title="Neon Blå"></button>
                <button class="color-btn" style="background: #80FF00;" data-color="#80FF00" title="Neon Lime"></button>
                <button class="color-btn" style="background: #FF0040;" data-color="#FF0040" title="Neon Röd"></button>
                <button class="color-btn" style="background: #00FF80;" data-color="#00FF80" title="Neon Teal"></button>
                <button class="color-btn" style="background: #FFFFFF;" data-color="#FFFFFF" title="Vit"></button>
                <button class="color-btn" style="background: #000000;" data-color="#000000" title="Svart"></button>
            </div>
        </div>

        <div class="toolbar-section">
            <h4 style="font-size: 12px; margin-bottom: 8px; color: #00FF00;">PENSEL</h4>
            <div class="slider-container">
                <label class="slider-label">Storlek: <span id="sizeValue">5</span>px</label>
                <input type="range" id="brushSize" min="1" max="50" value="5">
            </div>
        </div>

        <div class="toolbar-section">
            <h4 style="font-size: 12px; margin-bottom: 8px; color: #00FF00;">ÅNGRA</h4>
            <button class="tool-btn" id="undoBtn">↶ Ångra</button>
            <button class="tool-btn" id="redoBtn">↷ Gör om</button>
        </div>

        <div class="toolbar-section">
            <h4 style="font-size: 12px; margin-bottom: 8px; color: #00FF00;">FIL</h4>
            <button class="tool-btn" id="saveBtn">⬇ Spara</button>
            <button class="tool-btn" id="clearBtn">✕ Nytt</button>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="canvas" width="1200" height="700"></canvas>
        <div class="info">NEON LANDSKAP - Pixel Stil</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        let currentTool = 'pen';
        let currentColor = '#00FF00';
        let brushSize = 5;
        let isDrawing = false;
        let startX, startY;

        const history = [];
        let historyStep = -1;
        const MAX_HISTORY = 20;

        // Verktyg buttons
        document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTool = btn.dataset.tool;
            });
        });

        // Färg buttons
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentColor = btn.dataset.color;
            });
        });

        // Pensel storlek
        document.getElementById('brushSize').addEventListener('change', (e) => {
            brushSize = parseInt(e.target.value);
            document.getElementById('sizeValue').textContent = brushSize;
        });

        // Spara state
        function saveState() {
            historyStep++;
            if (historyStep < history.length) {
                history.length = historyStep;
            }
            history.push(canvas.toDataURL());
            if (history.length > MAX_HISTORY) {
                history.shift();
            } else {
                historyStep = history.length - 1;
            }
        }

        // Ångra
        document.getElementById('undoBtn').addEventListener('click', () => {
            if (historyStep > 0) {
                historyStep--;
                const img = new Image();
                img.src = history[historyStep];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        });

        // Gör om
        document.getElementById('redoBtn').addEventListener('click', () => {
            if (historyStep < history.length - 1) {
                historyStep++;
                const img = new Image();
                img.src = history[historyStep];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        });

        // Spara bild
        document.getElementById('saveBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'ritning_neon.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        // Nytt
        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('Vill du rensa allt?')) {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                saveState();
                history.length = 0;
                historyStep = -1;
            }
        });

        // Fyllning funktion
        function floodFill(x, y, color) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = canvas.width;

            const rgbColor = hexToRgb(color);
            const startColor = getPixelColor(x, y, data, width);

            if (colorsEqual(startColor, rgbColor)) return;

            const queue = [[x, y]];
            const visited = new Set();

            while (queue.length > 0) {
                const [cx, cy] = queue.shift();
                const key = `${cx},${cy}`;

                if (visited.has(key) || cx < 0 || cx >= width || cy < 0 || cy >= canvas.height) continue;

                const pixelColor = getPixelColor(cx, cy, data, width);
                if (!colorsEqual(pixelColor, startColor)) continue;

                visited.add(key);
                setPixelColor(cx, cy, data, width, rgbColor);

                queue.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function getPixelColor(x, y, data, width) {
            const index = (Math.floor(y) * width + Math.floor(x)) * 4;
            return [data[index], data[index + 1], data[index + 2], data[index + 3]];
        }

        function setPixelColor(x, y, data, width, color) {
            const index = (Math.floor(y) * width + Math.floor(x)) * 4;
            data[index] = color[0];
            data[index + 1] = color[1];
            data[index + 2] = color[2];
            data[index + 3] = 255;
        }

        function colorsEqual(c1, c2) {
            return c1[0] === c2[0] && c1[1] === c2[1] && c1[2] === c2[2];
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? [
                parseInt(result[1], 16),
                parseInt(result[2], 16),
                parseInt(result[3], 16)
            ] : [0, 255, 0];
        }

        // Canvas events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            startX = touch.clientX - rect.left;
            startY = touch.clientY - rect.top;
            isDrawing = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            drawPixel(x, y);
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDrawing = false;
            saveState();
        });

        function startDrawing(e) {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
        }

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            if (currentTool === 'line' || currentTool === 'rect' || currentTool === 'circle') {
                redrawFromHistory();
                drawShape(startX, startY, x, y);
            } else {
                drawPixel(x, y);
            }
        }

        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            saveState();
        }

        function drawPixel(x, y) {
            ctx.fillStyle = currentColor;
            ctx.strokeStyle = currentColor;
            ctx.lineCap = 'square';
            ctx.lineJoin = 'miter';
            ctx.lineWidth = brushSize;

            if (currentTool === 'pen') {
                ctx.fillRect(x - brushSize/2, y - brushSize/2, brushSize, brushSize);
            } else if (currentTool === 'eraser') {
                ctx.clearRect(x - brushSize/2, y - brushSize/2, brushSize, brushSize);
            }
        }

        function drawShape(x1, y1, x2, y2) {
            ctx.fillStyle = currentColor;
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = brushSize;

            if (currentTool === 'line') {
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            } else if (currentTool === 'rect') {
                const w = x2 - x1;
                const h = y2 - y1;
                ctx.strokeRect(x1, y1, w, h);
            } else if (currentTool === 'circle') {
                const r = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
                ctx.beginPath();
                ctx.arc(x1, y1, r, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function redrawFromHistory() {
            if (historyStep >= 0) {
                const img = new Image();
                img.src = history[historyStep];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        }

        // Ritning av startlandskap i pixel-stil
        function drawStartingLandscape() {
            const w = canvas.width;
            const h = canvas.height;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);

            // Himmel gradient
            ctx.fillStyle = '#0a0a2a';
            ctx.fillRect(0, 0, w, h * 0.4);

            // Neon sol
            ctx.fillStyle = '#FFFF00';
            ctx.fillRect(w - 120, 40, 80, 80);

            // Sol glöd
            ctx.fillStyle = '#FF8000';
            ctx.fillRect(w - 140, 20, 120, 120);
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = '#FF00FF';
            ctx.fillRect(w - 160, 0, 160, 160);
            ctx.globalAlpha = 1;

            // Bergstoppar
            drawMountain(50, h * 0.4, 200, 150, '#00FFFF');
            drawMountain(250, h * 0.35, 250, 180, '#00FF00');
            drawMountain(550, h * 0.45, 280, 120, '#FF00FF');
            drawMountain(900, h * 0.4, 200, 160, '#FF0080');

            // Väg/väg
            ctx.fillStyle = '#FFFF00';
            ctx.fillRect(0, h * 0.65, w, 40);
            ctx.fillStyle = '#FF00FF';
            ctx.fillRect(20, h * 0.7, 30, 30);
            ctx.fillRect(100, h * 0.7, 30, 30);
            ctx.fillRect(180, h * 0.7, 30, 30);
            ctx.fillRect(260, h * 0.7, 30, 30);
            ctx.fillRect(340, h * 0.7, 30, 30);
            ctx.fillRect(420, h * 0.7, 30, 30);
            ctx.fillRect(500, h * 0.7, 30, 30);
            ctx.fillRect(580, h * 0.7, 30, 30);
            ctx.fillRect(660, h * 0.7, 30, 30);
            ctx.fillRect(740, h * 0.7, 30, 30);
            ctx.fillRect(820, h * 0.7, 30, 30);
            ctx.fillRect(900, h * 0.7, 30, 30);
            ctx.fillRect(980, h * 0.7, 30, 30);
            ctx.fillRect(1060, h * 0.7, 30, 30);
            ctx.fillRect(1140, h * 0.7, 30, 30);

            // Mark
            ctx.fillStyle = '#00FF80';
            ctx.fillRect(0, h * 0.65, w, h * 0.35);

            // Träd
            drawTree(150, h * 0.5, '#00FFFF');
            drawTree(400, h * 0.55, '#00FF00');
            drawTree(700, h * 0.5, '#FF00FF');
            drawTree(1000, h * 0.55, '#FF0080');

            saveState();
        }

        function drawMountain(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + w/2, y - h);
            ctx.lineTo(x + w, y);
            ctx.fill();
        }

        function drawTree(x, y, color) {
            ctx.fillStyle = '#80FF00';
            ctx.fillRect(x - 5, y, 10, 20);

            ctx.fillStyle = color;
            ctx.fillRect(x - 20, y - 10, 40, 30);
            ctx.fillRect(x - 15, y - 30, 30, 30);
            ctx.fillRect(x - 10, y - 45, 20, 20);
        }

        // Initialisera
        drawStartingLandscape();
    </script>
</body>
</html>
