<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Robotrost</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a14;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    overflow: hidden;
    padding: 16px;
    user-select: none;
  }

  h1 {
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    font-weight: 900;
    letter-spacing: 2px;
    color: #00e5ff;
    text-shadow: 0 0 20px #00e5ff88;
    margin-bottom: 4px;
  }

  #status-text {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    height: 1.2em;
    text-align: center;
  }

  /* Effect buttons */
  #effects-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    width: 100%;
    max-width: 480px;
  }

  .effect-btn {
    padding: 8px 14px;
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    touch-action: manipulation;
  }
  .effect-btn.active {
    border-color: #00e5ff;
    background: #00e5ff22;
    color: #00e5ff;
    box-shadow: 0 0 12px #00e5ff55;
  }
  .effect-btn:hover { opacity: 0.85; }

  /* Waveform canvas */
  #waveform {
    width: 100%;
    max-width: 480px;
    height: 80px;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* Controls */
  #controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
    max-width: 320px;
  }

  #record-btn {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 4px solid #e53935;
    background: #e53935;
    color: #fff;
    font-size: 2.6rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s, box-shadow 0.12s;
    touch-action: manipulation;
    box-shadow: 0 0 30px #e5393588;
    position: relative;
  }
  #record-btn.recording {
    animation: pulse-ring 1s infinite;
    background: #b71c1c;
    border-color: #ff1744;
    box-shadow: 0 0 40px #ff174488;
  }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 #ff174488; }
    70%  { box-shadow: 0 0 0 20px #ff174400; }
    100% { box-shadow: 0 0 0 0 #ff174400; }
  }

  #action-row {
    display: flex;
    gap: 12px;
  }

  .ctrl-btn {
    padding: 14px 24px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 0.15s, border-color 0.15s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.14); }
  .ctrl-btn:disabled { opacity: 0.35; cursor: default; }

  /* Layers */
  #layers-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 480px;
  }
  #layers-label {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }
  #layers-row {
    display: flex;
    gap: 8px;
  }
  .layer-slot {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    border: 2px dashed rgba(255,255,255,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.35);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .layer-slot.has-audio {
    border-color: #00e5ff;
    background: #00e5ff22;
    color: #00e5ff;
    font-size: 1.4rem;
  }
  .layer-slot.active-slot {
    border-color: #e53935;
    box-shadow: 0 0 12px #e5393566;
  }

  #download-btn {
    padding: 12px 28px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #00e5ff, #00e5ff99);
    color: #fff;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    touch-action: manipulation;
    box-shadow: 0 4px 16px #00e5ff44;
    transition: opacity 0.15s;
  }
  #download-btn:disabled { opacity: 0.3; cursor: default; }

  #loop-badge {
    display: none;
    padding: 4px 10px;
    border-radius: 10px;
    background: #00e5ff22;
    border: 1px solid #00e5ff66;
    color: #00e5ff;
    font-size: 0.75rem;
    font-weight: 700;
  }
  #loop-badge.visible { display: inline-block; }
</style>
</head>
<body>

<div style="text-align:center;">
  <h1>Robotrost</h1>
  <div id="status-text">Tryck pa spela in-knappen for att borja</div>
</div>

<div id="effects-row">
  <button class="effect-btn" data-effect="none">Original</button>
  <button class="effect-btn" data-effect="robot">Robot</button>
  <button class="effect-btn" data-effect="chipmunk">Chipmunk</button>
  <button class="effect-btn" data-effect="monster">Monster</button>
  <button class="effect-btn" data-effect="echo">Echo</button>
  <button class="effect-btn" data-effect="reverb">Reverb</button>
  <button class="effect-btn" data-effect="pitchupp">Pitch upp</button>
</div>

<canvas id="waveform"></canvas>

<div id="controls">
  <span id="loop-badge">LOOPLAGE AKTIVT</span>
  <button id="record-btn" title="Spela in">&#127897;</button>
  <div id="action-row">
    <button class="ctrl-btn" id="play-btn" disabled>Spela upp</button>
    <button class="ctrl-btn" id="stop-btn" disabled>Stopp</button>
  </div>
</div>

<div id="layers-section">
  <div id="layers-label">LAGER</div>
  <div id="layers-row"></div>
</div>

<button id="download-btn" disabled>Ladda ner</button>

<script>
(function() {
  const DEFAULT_EFFECT = 'robot';
  const LOOP_MODE = 'ja' === 'ja';
  const LAYER_COUNT = parseInt('2') || 1;
  const ACCENT = '#00e5ff';

  let audioCtx = null;
  let analyser = null;
  let mediaStream = null;
  let mediaRecorder = null;
  let recordedChunks = [];
  let recordedBuffers = []; // per layer, AudioBuffer
  let activeLayer = 0;
  let isRecording = false;
  let isPlaying = false;
  let activeSources = [];
  let animFrame = null;
  let currentEffect = DEFAULT_EFFECT;

  // DOM
  const recordBtn = document.getElementById('record-btn');
  const playBtn = document.getElementById('play-btn');
  const stopBtn = document.getElementById('stop-btn');
  const downloadBtn = document.getElementById('download-btn');
  const statusText = document.getElementById('status-text');
  const waveCanvas = document.getElementById('waveform');
  const waveCtx = waveCanvas.getContext('2d');
  const effectBtns = document.querySelectorAll('.effect-btn');
  const layersRow = document.getElementById('layers-row');
  const loopBadge = document.getElementById('loop-badge');

  // Show loop badge if loop mode
  if (LOOP_MODE) loopBadge.classList.add('visible');

  // Build layer slots
  const layerSlots = [];
  for (let i = 0; i < LAYER_COUNT; i++) {
    const slot = document.createElement('div');
    slot.className = 'layer-slot' + (i === 0 ? ' active-slot' : '');
    slot.textContent = `L${i+1}`;
    slot.title = `Lager ${i+1}`;
    slot.dataset.layer = i;
    slot.addEventListener('click', () => switchLayer(i));
    layersRow.appendChild(slot);
    layerSlots.push(slot);
    recordedBuffers.push(null);
  }

  function switchLayer(idx) {
    activeLayer = idx;
    layerSlots.forEach((s, i) => {
      s.classList.toggle('active-slot', i === idx);
    });
  }

  // Set default effect button active
  function setEffect(eff) {
    currentEffect = eff;
    effectBtns.forEach(b => b.classList.toggle('active', b.dataset.effect === eff));
  }
  setEffect(DEFAULT_EFFECT === 'none' ? 'none' : DEFAULT_EFFECT);

  effectBtns.forEach(b => b.addEventListener('click', () => setEffect(b.dataset.effect)));

  // Ensure AudioContext
  function ensureCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
      analyser.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  // Waveform drawing
  function drawWaveform(dataArray, color) {
    const W = waveCanvas.width, H = waveCanvas.height;
    waveCtx.clearRect(0, 0, W, H);
    const step = Math.ceil(dataArray.length / W);
    waveCtx.beginPath();
    waveCtx.strokeStyle = color || ACCENT;
    waveCtx.lineWidth = 2;
    for (let x = 0; x < W; x++) {
      const val = dataArray[x * step] / 128.0;
      const y = (val * H) / 2;
      if (x === 0) waveCtx.moveTo(x, H / 2 + y);
      else waveCtx.lineTo(x, H / 2 + y);
    }
    waveCtx.stroke();
  }

  function drawIdle() {
    const W = waveCanvas.width, H = waveCanvas.height;
    waveCtx.clearRect(0, 0, W, H);
    waveCtx.strokeStyle = 'rgba(255,255,255,0.1)';
    waveCtx.lineWidth = 1;
    waveCtx.beginPath();
    waveCtx.moveTo(0, H / 2);
    waveCtx.lineTo(W, H / 2);
    waveCtx.stroke();
  }

  function startWaveformLoop() {
    const dataArray = new Uint8Array(analyser.fftSize);
    function loop() {
      analyser.getByteTimeDomainData(dataArray);
      drawWaveform(dataArray, ACCENT);
      animFrame = requestAnimationFrame(loop);
    }
    loop();
  }

  function stopWaveformLoop() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    drawIdle();
  }

  // Resize canvas
  function resizeCanvas() {
    const rect = waveCanvas.getBoundingClientRect();
    waveCanvas.width = rect.width * devicePixelRatio;
    waveCanvas.height = rect.height * devicePixelRatio;
    waveCtx.scale(devicePixelRatio, devicePixelRatio);
    drawIdle();
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // Record
  recordBtn.addEventListener('click', async () => {
    if (isRecording) {
      stopRecording();
    } else {
      await startRecording();
    }
  });

  async function startRecording() {
    try {
      ensureCtx();
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const source = audioCtx.createMediaStreamSource(mediaStream);
      source.connect(analyser);

      recordedChunks = [];
      mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm' });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = handleRecordingStop;
      mediaRecorder.start(100);
      isRecording = true;
      recordBtn.classList.add('recording');
      recordBtn.innerHTML = '&#9632;'; // stop square
      statusText.textContent = 'Spelar in...';
      playBtn.disabled = true;
      stopBtn.disabled = true;
      startWaveformLoop();
    } catch (err) {
      statusText.textContent = 'Mikrofon ej tillganglig. Tillat atkomst och forsok igen.';
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    if (mediaStream) {
      mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
    }
    isRecording = false;
    recordBtn.classList.remove('recording');
    recordBtn.innerHTML = '&#127897;';
    statusText.textContent = 'Bearbetar...';
    stopWaveformLoop();
  }

  async function handleRecordingStop() {
    const blob = new Blob(recordedChunks, { type: 'audio/webm' });
    const arrayBuf = await blob.arrayBuffer();
    try {
      const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
      recordedBuffers[activeLayer] = audioBuf;
      layerSlots[activeLayer].textContent = '&#127897;';
      layerSlots[activeLayer].innerHTML = '<span style="font-size:1.4rem">&#127897;</span>';
      layerSlots[activeLayer].classList.add('has-audio');
      playBtn.disabled = false;
      downloadBtn.disabled = false;
      statusText.textContent = 'Inspelning klar! Spela upp eller ladda ner.';

      // Auto-play preview
      playRecording();
    } catch {
      statusText.textContent = 'Kunde inte behandla ljud. Forsok igen.';
    }
  }

  // Build effect chain and play
  function applyEffect(source, effect) {
    ensureCtx();
    const ac = audioCtx;
    let node = source;

    if (effect === 'robot') {
      // Pitch down via playback rate (set on source before connecting)
      source.playbackRate.value = 0.7;
      const dist = ac.createWaveShaper();
      const curve = new Float32Array(256);
      for (let i = 0; i < 256; i++) { const x = i * 2 / 256 - 1; curve[i] = (3 + 20) * x / (Math.PI + 20 * Math.abs(x)); }
      dist.curve = curve;
      node.connect(dist);
      node = dist;
    } else if (effect === 'chipmunk') {
      source.playbackRate.value = 1.7;
    } else if (effect === 'monster') {
      source.playbackRate.value = 0.5;
    } else if (effect === 'pitchupp') {
      source.playbackRate.value = 1.4;
    } else if (effect === 'echo') {
      const delay = ac.createDelay(1.0);
      delay.delayTime.value = 0.35;
      const feedback = ac.createGain();
      feedback.gain.value = 0.55;
      const wetGain = ac.createGain();
      wetGain.gain.value = 0.5;
      node.connect(delay);
      delay.connect(feedback);
      feedback.connect(delay);
      delay.connect(wetGain);
      node = wetGain;
    } else if (effect === 'reverb') {
      // Simulate reverb with multiple delays
      const gains = [0.6, 0.4, 0.25, 0.15];
      const times = [0.07, 0.14, 0.22, 0.34];
      const merger = ac.createGain();
      merger.gain.value = 1;
      gains.forEach((g, i) => {
        const d = ac.createDelay(1.0);
        d.delayTime.value = times[i];
        const gn = ac.createGain();
        gn.gain.value = g;
        source.connect(d);
        d.connect(gn);
        gn.connect(merger);
      });
      node.connect(merger);
      node = merger;
    }

    node.connect(analyser);
    return node;
  }

  function playRecording() {
    if (isPlaying) stopPlayback();

    const layersToPay = recordedBuffers.filter(Boolean);
    if (layersToPay.length === 0) return;

    ensureCtx();
    isPlaying = true;
    activeSources = [];
    stopBtn.disabled = false;
    playBtn.disabled = true;
    statusText.textContent = 'Spelar upp' + (LOOP_MODE ? ' (loopar)' : '') + '...';
    startWaveformLoop();

    layersToPay.forEach((buf) => {
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.loop = LOOP_MODE;
      applyEffect(src, currentEffect);
      src.start(0);
      activeSources.push(src);
      src.onended = () => {
        if (!LOOP_MODE) {
          const allDone = activeSources.every(s => s._ended);
          src._ended = true;
          if (allDone) onPlaybackEnd();
        }
      };
    });
  }

  function onPlaybackEnd() {
    isPlaying = false;
    stopWaveformLoop();
    playBtn.disabled = false;
    stopBtn.disabled = true;
    statusText.textContent = 'Klar! Tryck spela upp for att hora igen.';
  }

  function stopPlayback() {
    activeSources.forEach(src => { try { src.stop(); } catch {} });
    activeSources = [];
    isPlaying = false;
    stopWaveformLoop();
    playBtn.disabled = recordedBuffers.every(b => !b);
    stopBtn.disabled = true;
    statusText.textContent = 'Stoppad.';
  }

  playBtn.addEventListener('click', playRecording);
  stopBtn.addEventListener('click', stopPlayback);

  // Download as WAV
  downloadBtn.addEventListener('click', () => {
    const hasAudio = recordedBuffers.filter(Boolean);
    if (!hasAudio.length) return;
    // Use the first non-null buffer
    const buf = hasAudio[0];
    const wavBlob = bufferToWav(buf);
    const url = URL.createObjectURL(wavBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rostlab-inspelning.wav';
    a.click();
    URL.revokeObjectURL(url);
  });

  // Simple WAV encoder
  function bufferToWav(buffer) {
    const numChannels = buffer.numberOfChannels;
    const sampleRate = buffer.sampleRate;
    const length = buffer.length;
    const wavBuf = new ArrayBuffer(44 + length * numChannels * 2);
    const view = new DataView(wavBuf);
    function writeStr(off, str) { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); }
    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + length * numChannels * 2, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * numChannels * 2, true);
    view.setUint16(32, numChannels * 2, true);
    view.setUint16(34, 16, true);
    writeStr(36, 'data');
    view.setUint32(40, length * numChannels * 2, true);
    let offset = 44;
    for (let i = 0; i < length; i++) {
      for (let ch = 0; ch < numChannels; ch++) {
        const sample = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
        view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
        offset += 2;
      }
    }
    return new Blob([wavBuf], { type: 'audio/wav' });
  }

  drawIdle();
})();
</script>
</body>
</html>
